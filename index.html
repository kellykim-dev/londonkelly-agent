@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0820;margin:0;}
#wrap{font-family:'Nunito',sans-serif;max-width:960px;margin:0 auto;background:#0f0820;overflow:hidden;}
#topbar{background:linear-gradient(90deg,#1a0e35,#0d1a35);color:#f8e8c0;font-size:15px;font-weight:800;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2a1a50;}

#notif{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif-toast{border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;animation:slideIn .4s ease,fadeOut .5s 3.5s forwards;min-width:200px;}

@keyframes fadeOut{to{opacity:0;transform:translateY(-8px);}}
#chatbox{background:#07030f;border-top:2px solid #1a0e35;padding:12px 16px;}
#chat-title{color:#ffd580;font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
#chat-msgs{background:#0a0518;border-radius:10px;padding:10px;min-height:80px;max-height:200px;overflow-y:auto;margin-bottom:10px;font-size:13px;line-height:1.8;}

#chat-input:focus{border-color:#4dd0c4;}
#chat-send{background:#4dd0c4;color:#0f0820;border:none;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
#chat-send:hover{background:#6de0d4;}
#trigger-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.trigger-btn{background:#1a1030;border:1.5px solid #2a1a50;color:#b0a0d0;padding:8px 6px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;text-align:center;text-decoration:none;display:block;}
.trigger-btn:hover{background:#2a1a40;color:#ffd580;border-color:#ffd580;}

<script>
const W=960,H=540;
const cv=document.getElementById('oc');
const cx=cv.getContext('2d');

const AC=new (window.AudioContext||window.webkitAudioContext)();
function playDone(){
  const t=AC.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(0,t+i*0.12);
    g.gain.linearRampToValueAtTime(0.18,t+i*0.12+0.05);
    g.gain.linearRampToValueAtTime(0,t+i*0.12+0.22);
    o.start(t+i*0.12);o.stop(t+i*0.12+0.25);
  });
}
function playNotif(){
  const t=AC.currentTime;
  [880,1100].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='triangle';
    g.gain.setValueAtTime(0,t+i*0.1);
    g.gain.linearRampToValueAtTime(0.12,t+i*0.1+0.04);
    g.gain.linearRampToValueAtTime(0,t+i*0.1+0.18);
    o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
  });
}
document.addEventListener('click',()=>AC.resume(),{once:true});

function showToast(msg,type){
  const el=document.createElement('div');
  el.className='notif-toast';
  const isDone=type==='done';
  el.style.cssText='border:1.5px solid '+(isDone?'#4caf50':'#ff9800')+';background:'+(isDone?'#0f1f0f':'#1f140a')+';color:'+(isDone?'#c8ffc8':'#ffe0b0')+';';
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  if(isDone)playDone(); else playNotif();
  setTimeout(()=>el.remove(),4200);
}

const AGENTS=[
  {name:'花花',task:'Collection 排序',state:'done',shirt:'#ff8fab',hair:'#3d2b1f',skin:'#f5c8a0',female:true},
  {name:'阿鼻',task:'Hot Items',state:'working',shirt:'#ffb347',hair:'#1a0a00',skin:'#d4956a',female:false},
  {name:'豆芽',task:'週報',state:'done',shirt:'#4dd0c4',hair:'#2a1808',skin:'#f0d0a8',female:true},
  {name:'啾皮',task:'社群內容',state:'working',shirt:'#b39ddb',hair:'#1a1a3a',skin:'#e8b080',female:false},
  {name:'咕嚕',task:'Indexing',state:'working',shirt:'#69d481',hair:'#3d2b1f',skin:'#f5c8a0',female:false},
  {name:'彩彩',task:'競爭對手',state:'done',shirt:'#f9e04b',hair:'#7a5a30',skin:'#e0a070',female:true},
  {name:'咕噹',task:'Blog draft',state:'done',shirt:'#f48fb1',hair:'#2d1b0e',skin:'#d8906a',female:false},
  {name:'蜜醬',task:'待機',state:'idle',shirt:'#90a4ae',hair:'#1a0a00',skin:'#f8dbb0',female:true},
];
const DESK_POS=[
  {x:18,y:75},{x:145,y:75},{x:272,y:75},{x:399,y:75},
  {x:18,y:225},{x:145,y:225},{x:272,y:225},{x:399,y:225},
];
const DW=110,DH=62;
const LOGS=[
  {t:'[豆芽] 週報 完成',c:'log-ok'},{t:'[彩彩] 競爭對手 完成',c:'log-ok'},
  {t:'[花花] Collection 排序 完成',c:'log-ok'},{t:'[咕噹] Blog draft 完成',c:'log-ok'},
  {t:'[系統] 下次：明日 06:00',c:'log-sys'},
];
LOGS.forEach(l=>{const d=document.createElement('div');d.className='logline '+l.c;d.textContent=l.t;document.getElementById('loglines').appendChild(d);});
AGENTS.forEach(a=>{
  const r=document.createElement('div');r.className='arow';
  const dc=a.state==='done'?'g':a.state==='working'?'o':'gr';
  const sl=a.state==='done'?'✓':a.state==='working'?'↻':'▶';
  r.innerHTML='<div class="adot '+dc+'"></div><span class="aname">'+a.name+'</span><span class="atask">'+a.task+'</span><span class="astatus '+(a.state==='working'?'s':'')+'">'+sl+'</span>';
  document.getElementById('alist').appendChild(r);
});
function updateClock(){const hk=new Date(Date.now()+8*3600000);document.getElementById('clk').textContent=hk.toISOString().slice(11,19)+' HKT';}
setInterval(updateClock,1000);updateClock();
setTimeout(()=>showToast('✅ 咕嚕 Indexing 完成！200 URLs submitted','done'),3000);
setTimeout(()=>showToast('↻ 啾皮 社群內容 進行中...','working'),8000);
setTimeout(()=>showToast('✅ 阿鼻 Hot Items 更新完成！','done'),14000);


// ── Asset URLs ───────────────────────────────────────
const BASE = 'assets/';
const imgs = {};
const toLoad = ['Interiors_free_16x16','Room_Builder_free_16x16','Adam_run_16x16','Amelia_run_16x16','Alex_run_16x16','Bob_run_16x16'];
let loaded = 0;
toLoad.forEach(name => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { loaded++; if(loaded===toLoad.length) animate(); };
  img.onerror = () => { loaded++; if(loaded===toLoad.length) animate(); };
  img.src = BASE + name + '.png';
  imgs[name] = img;
});

const TW=16,TH=16;

// Room_Builder tilemap - office left (0-37cols), break room right (38-59cols), 34 rows
// Using actual tileset rows from Interiors_free_16x16.png
// Row 0-1: walls/floors, Row 2+: furniture

// Tileset positions (sx, sy) = tile coords in Interiors_free_16x16.png
// Each tile is 16x16
const T = {
  // Floor tiles (row 0 in tileset)
  FLOOR_WOOD: [0, 0],
  FLOOR_DARK: [1, 0],
  FLOOR_CARPET: [2, 0],
  // Wall tiles (row 1)
  WALL: [0, 1],
  WALL_WINDOW: [3, 1],
  // Desk (row 2-3)
  DESK_TL: [0, 2], DESK_TR: [1, 2],
  DESK_BL: [0, 3], DESK_BR: [1, 3],
  // Computer on desk
  PC_L: [2, 2], PC_R: [3, 2],
  // Bookshelf
  SHELF_TL: [4, 2], SHELF_TR: [5, 2],
  SHELF_BL: [4, 3], SHELF_BR: [5, 3],
  // Sofa
  SOFA_TL: [6, 4], SOFA_TM: [7, 4], SOFA_TR: [8, 4],
  SOFA_BL: [6, 5], SOFA_BM: [7, 5], SOFA_BR: [8, 5],
  // Plant
  PLANT: [9, 2],
  // Coffee table
  TABLE_L: [10, 4], TABLE_R: [11, 4],
};

function rr(x,y,w,h,r,fill,stroke,lw){
  cx.beginPath();cx.roundRect(x,y,w,h,r);
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1;cx.stroke();}
}

// Draw a single 16x16 tile from tileset at canvas position
function drawTile(img, sx, sy, dx, dy, scale=1){
  if(!img || !img.complete || img.naturalWidth===0) {
    // Fallback colored rect
    cx.fillStyle = (sx+sy)%2===0 ? '#b8885a' : '#c49a6c';
    cx.fillRect(dx, dy, TW*scale, TH*scale);
    return;
  }
  cx.drawImage(img, sx*TW, sy*TH, TW, TH, dx, dy, TW*scale, TH*scale);
}

// Draw room using Room_Builder tileset
function drawRoom(){
  const rb = imgs['Room_Builder_free_16x16'];
  const int = imgs['Interiors_free_16x16'];
  
  // Office floor - wood (rows 1-13, cols 1-37)
  for(let ty=1; ty<14; ty++){
    for(let tx=1; tx<38; tx++){
      // Use floor tile from Room_Builder - row 1, alternating tiles
      const alt = (tx+ty)%2;
      if(rb && rb.complete && rb.naturalWidth > 0){
        cx.drawImage(rb, alt*TW, TH, TW, TH, tx*TW, ty*TH, TW, TH);
      } else {
        cx.fillStyle = alt ? '#c49a6c' : '#b8885a';
        cx.fillRect(tx*TW, ty*TH, TW, TH);
        cx.strokeStyle='rgba(0,0,0,0.1)';cx.lineWidth=0.3;cx.strokeRect(tx*TW, ty*TH, TW, TH);
      }
    }
  }
  
  // Break room floor - dark tiles (rows 1-13, cols 39-59)
  for(let ty=1; ty<14; ty++){
    for(let tx=39; tx<60; tx++){
      if(rb && rb.complete && rb.naturalWidth > 0){
        cx.drawImage(rb, 2*TW, TH, TW, TH, tx*TW, ty*TH, TW, TH);
      } else {
        const alt = (tx+ty)%2;
        cx.fillStyle = alt ? '#2e2644' : '#261e3a';
        cx.fillRect(tx*TW, ty*TH, TW, TH);
      }
    }
  }

  // Top wall - office
  for(let tx=0; tx<38; tx++){
    if(rb && rb.complete){
      cx.drawImage(rb, 0, 0, TW, TH, tx*TW, 0, TW, TH);
    } else {
      cx.fillStyle='#5c4a7a';cx.fillRect(tx*TW, 0, TW, TH);
    }
  }
  // Top wall - break room  
  for(let tx=38; tx<60; tx++){
    if(rb && rb.complete){
      cx.drawImage(rb, 0, 0, TW, TH, tx*TW, 0, TW, TH);
    } else {
      cx.fillStyle='#3a2a5a';cx.fillRect(tx*TW, 0, TW, TH);
    }
  }
  // Bottom wall / shelf area
  for(let ty=14; ty<17; ty++){
    for(let tx=0; tx<38; tx++){
      if(rb && rb.complete){
        cx.drawImage(rb, 0, 0, TW, TH, tx*TW, ty*TH, TW, TH);
      } else {
        cx.fillStyle='#3a2060';cx.fillRect(tx*TW, ty*TH, TW, TH);
      }
    }
  }
  // Side walls
  for(let ty=0; ty<17; ty++){
    [0, 37, 38, 59].forEach(tx => {
      if(rb && rb.complete){
        cx.drawImage(rb, 0, 0, TW, TH, tx*TW, ty*TH, TW, TH);
      } else {
        cx.fillStyle='#3a2060';cx.fillRect(tx*TW, ty*TH, TW, TH);
      }
    });
  }
}

// Draw furniture using Interiors tileset
function drawFurniture(){
  const int = imgs['Interiors_free_16x16'];
  
  // Desks - office (4 columns x 3 rows)
  const deskCols = [3,10,17,24,31];
  const deskRows = [1,5,9];
  deskCols.forEach(dc => {
    deskRows.forEach(dr => {
      if(int && int.complete && int.naturalWidth > 0){
        // Draw 2x2 desk from tileset row 6-7, col 0-1
        cx.drawImage(int, 0*TW, 6*TH, TW*2, TH*2, dc*TW, dr*TH, TW*2, TH*2);
      } else {
        cx.fillStyle='#8b6a40';cx.fillRect(dc*TW, dr*TH, TW*2, TH*2);
        cx.fillStyle='#1a1a2a';cx.fillRect(dc*TW, dr*TH, TW*2, TH);
        cx.fillStyle='#00ff88';cx.font='4px monospace';cx.textAlign='left';
        cx.fillText('>OK', dc*TW+2, dr*TH+TH-2);
      }
    });
  });
  
  // Bookshelves along bottom
  for(let tx=1; tx<36; tx+=2){
    if(int && int.complete && int.naturalWidth > 0){
      cx.drawImage(int, 4*TW, 2*TH, TW*2, TH*2, tx*TW, 14*TH, TW*2, TH*2);
    } else {
      cx.fillStyle='#5a3a1a';cx.fillRect(tx*TW, 14*TH, TW*2, TH*2);
      const bk=['#e74c3c','#3498db','#2ecc71','#f39c12'];
      for(let i=0;i<4;i++){cx.fillStyle=bk[i];cx.fillRect(tx*TW+i*4,14*TH+2,3,TH-4);}
    }
  }
  
  // Plants
  [[2,4],[2,10],[36,4],[36,10]].forEach(([tx,ty]) => {
    if(int && int.complete && int.naturalWidth > 0){
      cx.drawImage(int, 9*TW, 2*TH, TW, TH*2, tx*TW, ty*TH, TW, TH*2);
    } else {
      cx.fillStyle='#2d8a4a';cx.beginPath();cx.ellipse(tx*TW+8,ty*TH+8,6,8,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#8b5e3c';cx.fillRect(tx*TW+4,ty*TH+14,8,4);
    }
  });
  
  // Break room - sofa
  if(int && int.complete && int.naturalWidth > 0){
    cx.drawImage(int, 6*TW, 4*TH, TW*3, TH*2, 41*TW, 8*TH, TW*3, TH*2);
  } else {
    cx.fillStyle='#6a4a8a';cx.fillRect(41*TW, 8*TH, TW*3, TH*2);
  }
  
  // Coffee machine
  if(int && int.complete && int.naturalWidth > 0){
    cx.drawImage(int, 0*TW, 10*TH, TW*2, TH*2, 41*TW, 2*TH, TW*2, TH*2);
    cx.drawImage(int, 0*TW, 10*TH, TW*2, TH*2, 44*TW, 2*TH, TW*2, TH*2);
  } else {
    cx.fillStyle='#1e1e2e';cx.fillRect(41*TW, 2*TH, TW*4, TH*2);
    cx.fillStyle='#00ff88';cx.font='5px monospace';cx.textAlign='left';cx.fillText('READY',41*TW+4,3*TH);
  }
  
  // Rug
  cx.fillStyle='rgba(139,32,32,0.5)';cx.fillRect(41*TW, 8*TH, TW*8, TH*4);
  cx.strokeStyle='#ffd700';cx.lineWidth=1.5;cx.strokeRect(41*TW+2, 8*TH+2, TW*8-4, TH*4-4);
  
  // Plants break room
  [[55,4],[55,11],[58,2]].forEach(([tx,ty]) => {
    if(int && int.complete && int.naturalWidth > 0){
      cx.drawImage(int, 9*TW, 2*TH, TW, TH*2, tx*TW, ty*TH, TW, TH*2);
    } else {
      cx.fillStyle='#2d8a4a';cx.beginPath();cx.ellipse(tx*TW+8,ty*TH+8,6,8,0,0,Math.PI*2);cx.fill();
    }
  });
  
  // Steam animation on coffee machine
  const t=Date.now()/500;
  cx.strokeStyle='rgba(200,200,255,0.3)';cx.lineWidth=1;
  for(let i=0;i<2;i++){
    cx.beginPath();cx.moveTo(42*TW+i*TW*2, 2*TH);
    cx.bezierCurveTo(42*TW+i*TW*2+Math.sin(t+i)*3, TH, 42*TW+i*TW*2, 0, 42*TW+i*TW*2+Math.sin(t+i+1)*2, -TH*0.5);
    cx.stroke();
  }
}

function drawLabels(){
  // Room divider
  cx.strokeStyle='rgba(0,0,0,0.5)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(38*TW,0);cx.lineTo(38*TW,H);cx.stroke();
  // Labels
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,38*TW,14);
  cx.fillStyle='#ffd580';cx.font='bold 10px Nunito,sans-serif';cx.textAlign='left';
  cx.fillText('✦  OFFICE',5,10);
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(39*TW,0,21*TW,14);
  cx.fillStyle='#ff8fab';cx.fillText('✦  BREAK ROOM',39*TW+5,10);
}

// Character spritesheet: 384x32 = 24 frames, each 16x16
// Row 0: walk down, Row 1: walk left, Row 2: walk right, Row 3: walk up
// Each direction has 6 frames
function drawCharSprite(charImg, x, y, frame, dir, name, bubble){
  const px = Math.floor(x-8), py = Math.floor(y-20);
  
  // Shadow
  cx.fillStyle='rgba(0,0,0,0.2)';
  cx.beginPath();cx.ellipse(x, y+2, 6, 3, 0, 0, Math.PI*2);cx.fill();
  
  if(charImg && charImg.complete && charImg.naturalWidth > 0){
    // Sprite sheet: 24 frames wide, direction rows
    const dirRow = {down:0, left:1, right:2, up:3}[dir]||0;
    const f = frame % 6;
    const sx = f * TW;
    const sy = dirRow * TH;
    cx.drawImage(charImg, sx, sy, TW, TH, px, py, TW, TH);
  } else {
    // Fallback
    cx.fillStyle='#4a90d9';cx.fillRect(px+3,py,10,16);
    cx.fillStyle='#f5c8a0';cx.fillRect(px+3,py,10,8);
  }
  
  // Name tag
  cx.font='bold 8px Nunito,sans-serif';cx.textAlign='center';
  const nw = cx.measureText(name).width + 6;
  cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(x-nw/2, y+4, nw, 10);
  cx.fillStyle='#fff';cx.fillText(name, x, y+12);
  
  // Bubble
  if(bubble){
    cx.font='bold 7px Nunito,sans-serif';
    const bw = cx.measureText(bubble).width + 12;
    const bx = x-bw/2, by = py-16;
    cx.fillStyle='#fffef0';cx.beginPath();cx.roundRect(bx,by,bw,13,3);cx.fill();
    cx.strokeStyle='#d4a030';cx.lineWidth=1;cx.beginPath();cx.roundRect(bx,by,bw,13,3);cx.stroke();
    cx.fillStyle='#5a3a1a';cx.textAlign='center';cx.fillText(bubble,x,by+10);
    cx.fillStyle='#fffef0';
    cx.beginPath();cx.moveTo(x-3,by+13);cx.lineTo(x,by+17);cx.lineTo(x+3,by+13);cx.fill();
  }
}

// Agent sprites - assign each agent a character
const CHAR_SPRITES = ['Adam','Amelia','Alex','Bob','Adam','Amelia','Alex','Bob'];

// Desk positions in pixels
const DESK_PX = [
  {x:4*TW+TW, y:1*TH+TH}, {x:11*TW+TW, y:1*TH+TH}, {x:18*TW+TW, y:1*TH+TH},
  {x:4*TW+TW, y:5*TH+TH}, {x:11*TW+TW, y:5*TH+TH}, {x:18*TW+TW, y:5*TH+TH},
  {x:4*TW+TW, y:9*TH+TH}, {x:11*TW+TW, y:9*TH+TH},
];

const BREAK_PX = [
  {x:42*TW, y:4*TH}, {x:46*TW, y:4*TH}, {x:50*TW, y:4*TH},
  {x:43*TW, y:10*TH}, {x:47*TW, y:10*TH},
  {x:42*TW, y:12*TH}, {x:46*TW, y:12*TH}, {x:50*TW, y:12*TH},
];

const agentSt = AGENTS.map((a,i) => {
  const dp = DESK_PX[i] || DESK_PX[0];
  return {
    ...a,
    deskX: dp.x, deskY: dp.y,
    x: dp.x, y: dp.y, tx: dp.x, ty: dp.y,
    frame: Math.floor(Math.random()*6),
    dir: 'down',
    walkTimer: Math.floor(Math.random()*100),
    walkDelay: 120+i*40,
    breakMode: false, breakTimer: 0,
    charSprite: CHAR_SPRITES[i % CHAR_SPRITES.length],
  };
});

let tick = 0;
function animate(){
  cx.clearRect(0,0,W,H);
  drawRoom();
  drawFurniture();
  drawLabels();
  tick++;

  agentSt.forEach((a,i) => {
    a.walkTimer++;
    const sp = 1.2;
    if(a.breakMode){
      const dx=a.tx-a.x, dy=a.ty-a.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d > sp){
        a.x += dx/d*sp; a.y += dy/d*sp;
        a.dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');
        if(tick%6===0) a.frame++;
      } else {
        a.x=a.tx; a.y=a.ty; a.frame=0;
        a.breakTimer++;
        if(a.breakTimer > 200){
          a.breakMode=false; a.breakTimer=0;
          a.tx=a.deskX; a.ty=a.deskY;
        }
      }
    } else if(a.state==='idle'){
      if(a.walkTimer > a.walkDelay){
        const b = BREAK_PX[Math.floor(Math.random()*BREAK_PX.length)];
        a.tx=b.x; a.ty=b.y; a.breakMode=true; a.breakTimer=0;
        a.walkTimer=0; a.walkDelay=80+Math.random()*100;
      }
    } else {
      if(a.walkTimer > 220+i*55){
        const b = BREAK_PX[i%BREAK_PX.length];
        a.tx=b.x; a.ty=b.y; a.breakMode=true; a.breakTimer=0; a.walkTimer=0;
      } else {
        a.x=a.deskX; a.y=a.deskY;
        a.dir='down'; a.frame=0;
      }
    }
  });

  [...agentSt].sort((a,b) => a.y-b.y).forEach(a => {
    const atDesk = !a.breakMode && Math.abs(a.x-a.deskX)<3;
    const bubble = atDesk && a.state==='working' ? a.task : a.breakMode ? '☕' : null;
    const charImg = imgs[a.charSprite+'_run_16x16'];
    drawCharSprite(charImg, a.x, a.y, a.frame, a.dir, a.name, bubble);
  });

  requestAnimationFrame(animate);
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  addMsg(msg,'user');
  addMsg('思考中...','sys');
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'You are LondonKelly AI assistant. Answer in Traditional Chinese. Be concise.',
        messages:[{role:'user',content:msg}]})
    });
    const data=await resp.json();
    const answer=data.content?.[0]?.text||'抱歉，無法回應。';
    const msgs=document.getElementById('chat-msgs');
    const last=msgs.lastChild;if(last&&last.textContent==='思考中...')msgs.removeChild(last);
    addMsg(answer,'bot');
  }catch(e){
    const msgs=document.getElementById('chat-msgs');
    const last=msgs.lastChild;if(last&&last.textContent==='思考中...')msgs.removeChild(last);
    addMsg('提示：Click 上面按鈕可手動觸發 agents！','bot');
  }
}
function addMsg(text,type){
  const msgs=document.getElementById('chat-msgs');
  const div=document.createElement('div');div.className='chat-msg-'+type;div.textContent=text;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
