@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0820;margin:0;}
#wrap{font-family:'Nunito',sans-serif;max-width:960px;margin:0 auto;background:#0f0820;overflow:hidden;}
#topbar{background:linear-gradient(90deg,#1a0e35,#0d1a35);color:#f8e8c0;font-size:15px;font-weight:800;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2a1a50;}

canvas#oc{display:block;width:100%;image-rendering:pixelated;}

.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.adot.g{background:#4caf50;}.adot.o{background:#ff9800;animation:p 1.2s infinite;}.adot.gr{background:#666;}

.btn{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#f0e8c0;padding:10px 6px;border-radius:10px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s;text-align:center;}
.btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);}

#notif{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif-toast{border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;animation:slideIn .4s ease,fadeOut .5s 3.5s forwards;min-width:200px;}
@keyframes slideIn{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-8px);}}
#chatbox{background:#07030f;border-top:2px solid #1a0e35;padding:12px 16px;}
#chat-title{color:#ffd580;font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
#chat-msgs{background:#0a0518;border-radius:10px;padding:10px;min-height:80px;max-height:200px;overflow-y:auto;margin-bottom:10px;font-size:13px;line-height:1.8;}

.chat-msg-bot{color:#4dd0c4;margin:4px 0;}.chat-msg-bot::before{content:'🤖 ';}

#chat-input-row{display:flex;gap:8px;}
#chat-input{flex:1;background:#1a1030;border:1.5px solid #2a1a50;color:#f0e8c0;padding:9px 14px;border-radius:10px;font-size:13px;font-family:'Nunito',sans-serif;outline:none;}
#chat-input:focus{border-color:#4dd0c4;}
#chat-send{background:#4dd0c4;color:#0f0820;border:none;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
#chat-send:hover{background:#6de0d4;}
#trigger-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.trigger-btn{background:#1a1030;border:1.5px solid #2a1a50;color:#b0a0d0;padding:8px 6px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;text-align:center;text-decoration:none;display:block;}

<script>
const W=960,H=540;
const cv=document.getElementById('oc');
const cx=cv.getContext('2d');

const AC=new (window.AudioContext||window.webkitAudioContext)();
function playDone(){
  const t=AC.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(0,t+i*0.12);
    g.gain.linearRampToValueAtTime(0.18,t+i*0.12+0.05);
    g.gain.linearRampToValueAtTime(0,t+i*0.12+0.22);
    o.start(t+i*0.12);o.stop(t+i*0.12+0.25);
  });
}
function playNotif(){
  const t=AC.currentTime;
  [880,1100].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='triangle';
    g.gain.setValueAtTime(0,t+i*0.1);
    g.gain.linearRampToValueAtTime(0.12,t+i*0.1+0.04);
    g.gain.linearRampToValueAtTime(0,t+i*0.1+0.18);
    o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
  });
}
document.addEventListener('click',()=>AC.resume(),{once:true});

function showToast(msg,type){
  const el=document.createElement('div');
  el.className='notif-toast';
  const isDone=type==='done';
  el.style.cssText='border:1.5px solid '+(isDone?'#4caf50':'#ff9800')+';background:'+(isDone?'#0f1f0f':'#1f140a')+';color:'+(isDone?'#c8ffc8':'#ffe0b0')+';';
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  if(isDone)playDone(); else playNotif();
  setTimeout(()=>el.remove(),4200);
}

const AGENTS=[
  {name:'花花',task:'Collection 排序',state:'done',shirt:'#ff8fab',hair:'#3d2b1f',skin:'#f5c8a0',female:true},
  {name:'阿鼻',task:'Hot Items',state:'working',shirt:'#ffb347',hair:'#1a0a00',skin:'#d4956a',female:false},
  {name:'豆芽',task:'週報',state:'done',shirt:'#4dd0c4',hair:'#2a1808',skin:'#f0d0a8',female:true},
  {name:'啾皮',task:'社群內容',state:'working',shirt:'#b39ddb',hair:'#1a1a3a',skin:'#e8b080',female:false},
  {name:'咕嚕',task:'Indexing',state:'working',shirt:'#69d481',hair:'#3d2b1f',skin:'#f5c8a0',female:false},
  {name:'彩彩',task:'競爭對手',state:'done',shirt:'#f9e04b',hair:'#7a5a30',skin:'#e0a070',female:true},
  {name:'咕噹',task:'Blog draft',state:'done',shirt:'#f48fb1',hair:'#2d1b0e',skin:'#d8906a',female:false},
  {name:'蜜醬',task:'待機',state:'idle',shirt:'#90a4ae',hair:'#1a0a00',skin:'#f8dbb0',female:true},
];
const DESK_POS=[
  {x:18,y:75},{x:145,y:75},{x:272,y:75},{x:399,y:75},
  {x:18,y:225},{x:145,y:225},{x:272,y:225},{x:399,y:225},
];
const DW=110,DH=62;
const LOGS=[
  {t:'[豆芽] 週報 完成',c:'log-ok'},{t:'[彩彩] 競爭對手 完成',c:'log-ok'},
  {t:'[花花] Collection 排序 完成',c:'log-ok'},{t:'[咕噹] Blog draft 完成',c:'log-ok'},
  {t:'[系統] 下次：明日 06:00',c:'log-sys'},
];
LOGS.forEach(l=>{const d=document.createElement('div');d.className='logline '+l.c;d.textContent=l.t;document.getElementById('loglines').appendChild(d);});
AGENTS.forEach(a=>{
  const r=document.createElement('div');r.className='arow';

function updateClock(){const hk=new Date(Date.now()+8*3600000);document.getElementById('clk').textContent=hk.toISOString().slice(11,19)+' HKT';}

setTimeout(()=>showToast('✅ 咕嚕 Indexing 完成！200 URLs submitted','done'),3000);

// ═══════════════════════════════════════════════════
// RPG PIXEL ART ENGINE v2 - High Quality
// ═══════════════════════════════════════════════════

function rr(x,y,w,h,r,fill,stroke,lw){
  cx.beginPath();cx.roundRect(x,y,w,h,r);
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1;cx.stroke();}
}

function drawWoodFloor(fx,fy,fw,fh){
  const colors=['#c49a6c','#be9062','#c89e70','#b88858'];
  const tW=40,tH=40;
  for(let ty=fy;ty<fy+fh;ty+=tH){
    for(let tx=fx;tx<fx+fw;tx+=tW){
      const ci=((Math.floor((tx-fx)/tW))+(Math.floor((ty-fy)/tH)))%2;
      cx.fillStyle=colors[ci*2+(Math.floor((tx-fx)/tW))%2];
      cx.fillRect(tx,ty,tW,tH);
      cx.strokeStyle='#a07848';cx.lineWidth=0.7;cx.strokeRect(tx+1,ty+1,tW-2,tH-2);
      cx.strokeStyle='rgba(120,80,40,0.15)';cx.lineWidth=0.5;
      for(let g=0;g<3;g++){cx.beginPath();cx.moveTo(tx+5+g*12,ty+2);cx.lineTo(tx+8+g*12,ty+tH-2);cx.stroke();}
    }
  }
}

function drawDarkTileFloor(fx,fy,fw,fh){
  const tW=38,tH=38;
  for(let ty=fy;ty<fy+fh;ty+=tH){
    for(let tx=fx;tx<fx+fw;tx+=tW){
      const c=(Math.floor((tx-fx)/tW)+Math.floor((ty-fy)/tH))%2===0?'#2e2448':'#261e3e';
      cx.fillStyle=c;cx.fillRect(tx,ty,tW,tH);
      cx.strokeStyle='rgba(90,70,130,0.5)';cx.lineWidth=0.8;cx.strokeRect(tx,ty,tW,tH);
    }
  }
  const g=cx.createRadialGradient(800,H/2,10,800,H/2,200);
  g.addColorStop(0,'rgba(100,80,180,0.08)');g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g;cx.fillRect(fx,fy,fw,fh);
}

function drawBookshelf(bx,by,wide){
  const sw=wide?200:100,sh=72;
  rr(bx,by,sw,sh,3,'#5c3a1a','#3a2010',2);
  for(let s=0;s<2;s++){
    const sy=by+8+s*30;
    cx.fillStyle='#7a5030';cx.fillRect(bx+4,sy+22,sw-8,5);
    const bkColors=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#ff5722','#607d8b','#795548'];
    const bcount=wide?14:7;
    for(let b=0;b<bcount;b++){
      const ex=bx+5+b*((sw-10)/bcount);
      const bh=12+Math.sin(b*2.3)*4;
      const bc=bkColors[(b+Math.floor(bx/10))%bkColors.length];
      cx.fillStyle=bc;cx.fillRect(ex,sy+22-bh,Math.floor((sw-10)/bcount)-1,bh);
      cx.fillStyle='rgba(255,255,255,0.2)';cx.fillRect(ex,sy+22-bh,2,bh);
      cx.strokeStyle='rgba(0,0,0,0.3)';cx.lineWidth=0.5;cx.strokeRect(ex,sy+22-bh,Math.floor((sw-10)/bcount)-1,bh);
    }
  }
  cx.strokeStyle='#2a1808';cx.lineWidth=1.5;cx.strokeRect(bx,by,sw,sh);
}

function drawWall(wx,wy,ww,wh,col,topCol){
  cx.fillStyle=topCol||'#d4c8b8';cx.fillRect(wx,wy,ww,12);
  cx.fillStyle=col||'#e8dcc8';cx.fillRect(wx,wy+12,ww,wh-12);
  cx.fillStyle='#c0b098';cx.fillRect(wx,wy+wh-8,ww,8);
  cx.fillStyle='#a89080';cx.fillRect(wx,wy+wh-9,ww,2);
  cx.fillStyle='rgba(0,0,0,0.025)';
  for(let dwx=wx+20;dwx<wx+ww;dwx+=30)for(let dwy=wy+20;dwy<wy+wh-10;dwy+=25)cx.fillRect(dwx,dwy,2,2);
}

function drawWindow(wx,wy){
  rr(wx,wy,60,70,3,'#a07840','#7a5820',2);
  rr(wx+5,wy+5,50,60,2,'#b8d4f0','#90b4d0',1);
  const sky=cx.createLinearGradient(wx+5,wy+5,wx+5,wy+60);
  sky.addColorStop(0,'#87ceeb');sky.addColorStop(1,'#d4e8f8');
  cx.fillStyle=sky;cx.fillRect(wx+5,wy+5,50,60);
  const t=Date.now()/3000;
  cx.fillStyle='rgba(255,255,255,0.9)';
  cx.beginPath();cx.ellipse(wx+18+Math.sin(t)*3,wy+18,8,5,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(wx+38+Math.cos(t)*3,wy+22,6,4,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#5a9a40';cx.fillRect(wx+5,wy+38,50,27);
  cx.fillStyle='#4a8a30';cx.fillRect(wx+5,wy+38,50,8);
  cx.strokeStyle='#7a5820';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(wx+30,wy+5);cx.lineTo(wx+30,wy+65);cx.stroke();
  cx.beginPath();cx.moveTo(wx+5,wy+37);cx.lineTo(wx+55,wy+37);cx.stroke();
  const gl=cx.createRadialGradient(wx+30,wy+30,5,wx+30,wy+30,40);
  gl.addColorStop(0,'rgba(200,220,255,0.15)');gl.addColorStop(1,'rgba(200,220,255,0)');
  cx.fillStyle=gl;cx.fillRect(wx-20,wy-10,100,90);
}

function drawPainting(px,py){
  rr(px,py,80,52,2,'#c8a458','#a07830',3);
  rr(px+5,py+5,70,42,1,'#e8f0f8',null);
  const sky2=cx.createLinearGradient(px+5,py+5,px+5,py+28);
  sky2.addColorStop(0,'#7ec8e3');sky2.addColorStop(1,'#b8dff0');
  cx.fillStyle=sky2;cx.fillRect(px+6,py+6,68,28);
  cx.fillStyle='#5a8a40';cx.fillRect(px+6,py+28,68,18);
  cx.fillStyle='#6aaa50';
  cx.beginPath();cx.ellipse(px+25,py+28,16,10,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(px+55,py+28,12,8,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#c87828';cx.fillRect(px+35,py+30,6,16);
  cx.strokeStyle='#a07830';cx.lineWidth=2;cx.strokeRect(px+6,py+6,68,40);
}

function drawRPGDesk(dx,dy,shirtCol){
  const DW=100,DH=56;
  cx.fillStyle='rgba(0,0,0,0.15)';rr(dx+4,dy+4,DW,DH,4,'rgba(0,0,0,0.12)');
  rr(dx,dy,DW,DH,4,'#9a7040','#6a4820',2);
  cx.fillStyle='rgba(255,255,255,0.12)';cx.fillRect(dx+4,dy+4,DW-8,8);
  cx.strokeStyle='rgba(100,60,20,0.3)';cx.lineWidth=0.8;
  for(let g=0;g<3;g++){cx.beginPath();cx.moveTo(dx+10+g*28,dy+2);cx.lineTo(dx+14+g*28,dy+DH-2);cx.stroke();}
  rr(dx+28,dy+6,44,28,3,'#1a1a2e','#2a2a40',1.5);
  rr(dx+30,dy+8,40,24,2,'#0d1a35',null);
  cx.fillStyle='#00ff88';cx.font='5px monospace';cx.textAlign='left';
  cx.fillText('> running',dx+33,dy+18);
  cx.fillStyle='rgba(0,255,136,0.6)';cx.fillText('OK',dx+33,dy+28);
  cx.fillStyle='#2a2a40';cx.fillRect(dx+48,dy+34,4,5);cx.fillRect(dx+43,dy+38,14,3);
  const sg=cx.createRadialGradient(dx+50,dy+20,2,dx+50,dy+20,25);
  sg.addColorStop(0,'rgba(0,200,100,0.1)');sg.addColorStop(1,'rgba(0,200,100,0)');
  cx.fillStyle=sg;cx.fillRect(dx+25,dy+4,50,35);
  rr(dx+8,dy+36,38,10,2,'#ddd8d0','#b8b0a8',1);
  for(let k=0;k<5;k++)rr(dx+10+k*7,dy+38,5,6,1,'#c8c0b8','#a8a098',0.5);
  rr(dx+50,dy+37,12,9,4,'#e8e4dc','#c0bab0',1);
  cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(dx+55,dy+37,1,9);
  rr(dx+DW-18,dy+4,14,18,2,'#4a3a2a','#2a1a0a',1);
  cx.fillStyle='#f8f4e8';cx.fillRect(dx+DW-16,dy+6,10,14);
  cx.strokeStyle='#aaa';cx.lineWidth=0.5;
  for(let l=0;l<3;l++){cx.beginPath();cx.moveTo(dx+DW-15,dy+9+l*3);cx.lineTo(dx+DW-8,dy+9+l*3);cx.stroke();}
  rr(dx+6,dy+8,12,14,3,shirtCol||'#ff8fab','rgba(0,0,0,0.3)',1);
  cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(dx+8,dy+10,8,3);
  cx.strokeStyle='rgba(0,0,0,0.4)';cx.lineWidth=1;
  cx.beginPath();cx.arc(dx+18,dy+14,3,Math.PI*0.5,Math.PI*1.5);cx.stroke();
  const stm=Date.now()/600;
  cx.strokeStyle='rgba(200,200,255,0.4)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(dx+11,dy+8);cx.bezierCurveTo(dx+9+Math.sin(stm)*2,dy+4,dx+13+Math.sin(stm+1)*2,dy+1,dx+11,dy-2);cx.stroke();
}

function drawRPGChair(cx2,cy,col){
  cx.fillStyle='rgba(0,0,0,0.12)';cx.beginPath();cx.ellipse(cx2,cy+32,18,6,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#3a3a4a';cx.fillRect(cx2-16,cy+26,32,4);
  [[cx2-14,cy+30],[cx2+12,cy+30],[cx2-8,cy+28],[cx2+6,cy+28]].forEach(([wx,wy])=>{

function drawWallClock(clkx,clky){
  rr(clkx-18,clky-18,36,36,18,'#f0e8d8','#c0a880',2);
  cx.strokeStyle='#8a6040';cx.lineWidth=1;
  for(let m=0;m<12;m++){
    const a=m*Math.PI/6,r=14;
    cx.beginPath();cx.moveTo(clkx+Math.cos(a)*r,clky+Math.sin(a)*r);
    cx.lineTo(clkx+Math.cos(a)*(r-3),clky+Math.sin(a)*(r-3));cx.stroke();
  }
  const now=new Date(Date.now()+8*3600000);
  const hr=(now.getHours()%12+now.getMinutes()/60)*Math.PI/6-Math.PI/2;
  const mn=now.getMinutes()*Math.PI/30-Math.PI/2;
  cx.strokeStyle='#3a2a1a';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(clkx,clky);cx.lineTo(clkx+Math.cos(hr)*8,clky+Math.sin(hr)*8);cx.stroke();
  cx.strokeStyle='#5a3a2a';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(clkx,clky);cx.lineTo(clkx+Math.cos(mn)*12,clky+Math.sin(mn)*12);cx.stroke();
  cx.fillStyle='#8a5030';cx.beginPath();cx.arc(clkx,clky,2,0,Math.PI*2);cx.fill();
}

const CHAIR_COLORS=['#4a90d9','#d9504a','#4ad990','#d9a04a','#904ad9','#d94a90','#4a9090','#9090d9'];

function drawRPGChar(cx2,cy,skin,shirt,hair,female,wf,dir,name,bubble,ci){
  if(ci!==undefined)drawRPGChair(cx2,cy+14,CHAIR_COLORS[ci%8]);
  const frame=Math.floor(wf/3)%4;
  const walking=wf>0;
  cx.save();
  if(dir==='left'){cx.scale(-1,1);cx.translate(-cx2*2,0);}
  // shadow
  cx.fillStyle='rgba(0,0,0,0.18)';cx.beginPath();cx.ellipse(cx2,cy+8,9,3,0,0,Math.PI*2);cx.fill();
  // legs
  const legOff=walking?[[-3,frame%2===0?0:3],[3,frame%2===0?3:0]]:[[-3,0],[3,0]];
  if(!female){
    cx.fillStyle='#4a3a2a';
    legOff.forEach(([ox,oy])=>{cx.fillRect(cx2+ox-2,cy+5,4,10+oy);});
    cx.fillStyle='#2a1a0a';
    legOff.forEach(([ox,oy])=>{cx.fillRect(cx2+ox-2,cy+14+oy,4,3);});
  }else{
    cx.fillStyle='#f0c0a0';
    legOff.forEach(([ox,oy])=>{cx.fillRect(cx2+ox-2,cy+8,4,8+oy);});
    cx.fillStyle='#c0392b';
    legOff.forEach(([ox,oy])=>{cx.fillRect(cx2+ox-3,cy+16+oy,5,3);});
  }
  // body
  cx.fillStyle=shirt;
  if(female){
    cx.beginPath();cx.moveTo(cx2-6,cy-7);cx.lineTo(cx2+6,cy-7);cx.lineTo(cx2+8,cy+8);cx.lineTo(cx2-8,cy+8);cx.closePath();cx.fill();
  }else{
    cx.fillRect(cx2-6,cy-7,12,12);
    cx.fillStyle='rgba(255,255,255,0.25)';cx.fillRect(cx2-2,cy-7,4,4);
  }
  cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(cx2-5,cy-7,5,6);
  // arms
  const armSwing=walking?(frame%2===0?-2:2):0;
  cx.fillStyle=skin;cx.fillRect(cx2-9,cy-7+armSwing,3,9);cx.fillRect(cx2+6,cy-7-armSwing,3,9);
  // head
  cx.fillStyle=skin;cx.fillRect(cx2-5,cy-18,10,12);
  cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(cx2-5,cy-18,10,4);
  // hair
  cx.fillStyle=hair;
  if(female){
    cx.fillRect(cx2-6,cy-26,12,10);cx.fillRect(cx2-8,cy-22,4,16);cx.fillRect(cx2+4,cy-22,4,16);cx.fillRect(cx2-7,cy-26,14,5);
    cx.fillStyle='rgba(255,255,255,0.2)';cx.fillRect(cx2-3,cy-26,5,3);
  }else{
    cx.fillRect(cx2-5,cy-25,10,9);cx.fillRect(cx2-6,cy-24,3,5);
    cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(cx2-2,cy-25,4,3);
  }
  // eyes
  cx.fillStyle='#1a0a00';cx.fillRect(cx2-3,cy-15,2,2);cx.fillRect(cx2+1,cy-15,2,2);
  cx.fillStyle='rgba(255,255,255,0.8)';cx.fillRect(cx2-3,cy-15,1,1);cx.fillRect(cx2+1,cy-15,1,1);
  if(female){cx.fillStyle='rgba(255,150,150,0.5)';cx.fillRect(cx2-5,cy-13,3,2);cx.fillRect(cx2+2,cy-13,3,2);}
  cx.fillStyle='#c84060';cx.fillRect(cx2-1,cy-10,3,1);
  cx.restore();
  // name tag
  cx.font='bold 9px Nunito,sans-serif';cx.textAlign='center';
  const nw=cx.measureText(name).width+8;
  rr(cx2-nw/2,cy+11,nw,12,3,'rgba(0,0,0,0.45)');
  cx.fillStyle='#ffffff';cx.fillText(name,cx2,cy+21);
  // speech bubble
  if(bubble){
    cx.font='bold 8px Nunito,sans-serif';
    const bw=cx.measureText(bubble).width+14;
    const bx2=cx2-bw/2,bby=cy-52;
    rr(bx2,bby,bw,16,5,'#fff8ee','#e0a040',1.5);
    cx.fillStyle='#5a3a1a';cx.textAlign='center';cx.fillText(bubble,cx2,bby+11);
    cx.beginPath();cx.moveTo(cx2-4,bby+16);cx.lineTo(cx2,bby+22);cx.lineTo(cx2+4,bby+16);
    cx.fillStyle='#fff8ee';cx.fill();cx.strokeStyle='#e0a040';cx.lineWidth=1;cx.stroke();
  }
}

const BREAK_SPOTS=[
  {x:695,y:180},{x:730,y:390},{x:760,y:440},{x:710,y:140},
  {x:820,y:300},{x:870,y:190},{x:910,y:380},{x:860,y:460}
];
const agentSt=AGENTS.map((a,i)=>({
  ...a,deskX:DESK_POS[i].x+55,deskY:DESK_POS[i].y+75,
  x:DESK_POS[i].x+55,y:DESK_POS[i].y+75,tx:DESK_POS[i].x+55,ty:DESK_POS[i].y+75,
  wf:Math.floor(Math.random()*4),dir:'right',walkTimer:Math.floor(Math.random()*150),
  walkDelay:150+i*40,breakMode:false,breakTimer:0,ci:i,
}));
let tick=0;
function animate(){
  cx.clearRect(0,0,W,H);drawScene();
  DESK_POS.forEach((d,i)=>{drawRPGDesk(d.x,d.y,AGENTS[i].shirt);});
  tick++;
  agentSt.forEach((a,i)=>{
    a.walkTimer++;
    if(a.state==='idle'||a.breakMode){
      const dx=a.tx-a.x,dy=a.ty-a.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>2){a.x+=dx/dist*1.5;a.y+=dy/dist*1.5;a.dir=dx>0?'right':'left';if(tick%6===0)a.wf++;}
      else{a.wf=0;if(a.breakMode){a.breakTimer++;if(a.breakTimer>150){a.breakMode=false;a.breakTimer=0;a.tx=a.deskX;a.ty=a.deskY;}}}
      if(a.walkTimer>a.walkDelay&&!a.breakMode){const s=BREAK_SPOTS[Math.floor(Math.random()*BREAK_SPOTS.length)];a.tx=s.x;a.ty=s.y;a.walkDelay=120+Math.random()*160;a.walkTimer=0;}
    }else{
      if(a.walkTimer>280+i*55&&!a.breakMode){a.breakMode=true;a.breakTimer=0;const s=BREAK_SPOTS[i%BREAK_SPOTS.length];a.tx=s.x;a.ty=s.y;a.walkTimer=0;}
      else if(!a.breakMode){a.x=a.deskX;a.y=a.deskY;a.wf=0;}
    }
  });
  [...agentSt].sort((a,b)=>a.y-b.y).forEach(a=>{
    const atDesk=!a.breakMode&&a.state!=='idle'&&Math.abs(a.x-a.deskX)<5;
    const bubble=atDesk&&a.state==='working'?a.task:a.breakMode?'☕':null;
    drawRPGChar(a.x,a.y,a.skin,a.shirt,a.hair,a.female,a.wf,a.dir,a.name,bubble,atDesk?a.ci:undefined);
  });
  requestAnimationFrame(animate);
}
animate();

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  addMsg(msg,'user');
  addMsg('思考中...','sys');
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'You are LondonKelly AI assistant. Answer in Traditional Chinese. Be concise.',
        messages:[{role:'user',content:msg}]})
    });
    const data=await resp.json();
    const answer=data.content?.[0]?.text||'抱歉，無法回應。';
    const msgs=document.getElementById('chat-msgs');
    const last=msgs.lastChild;if(last&&last.textContent==='思考中...')msgs.removeChild(last);
    addMsg(answer,'bot');
  }catch(e){
    const msgs=document.getElementById('chat-msgs');
    const last=msgs.lastChild;if(last&&last.textContent==='思考中...')msgs.removeChild(last);
    addMsg('提示：Click 上面按鈕可手動觸發 agents！','bot');
  }
}
function addMsg(text,type){
  const msgs=document.getElementById('chat-msgs');
  const div=document.createElement('div');div.className='chat-msg-'+type;div.textContent=text;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
