<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LondonKelly AI 辦公室</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0a06;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:12px;}
#wrap{font-family:'Press Start 2P',monospace;max-width:900px;width:100%;}
#topbar{background:#1a0e05;color:#FFD700;font-size:12px;padding:12px 16px;display:flex;justify-content:space-between;border-bottom:3px solid #3a2010;}
canvas{display:block;width:100%;image-rendering:pixelated;}
#bottom{background:#080510;border-top:3px solid #1a1a3e;padding:14px 16px;display:flex;gap:16px;}
#logbox{flex:1;}
#logtitle{color:#00FF88;font-size:11px;margin-bottom:8px;}
#loglines div{font-size:10px;line-height:2.4;font-family:monospace;}
.lk-ok{color:#00FF88;}.lk-info{color:#88DDFF;}.lk-warn{color:#FFD700;}
#agentlist{width:200px;}
#alisttitle{color:#FFD700;font-size:11px;margin-bottom:8px;}
.alist-row{font-size:10px;line-height:2.4;display:flex;gap:8px;align-items:center;}
.alist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.alist-name{color:#ddd;}
#links{background:#080510;border-top:1px solid #1a1a3e;padding:10px 16px;display:flex;gap:10px;flex-wrap:wrap;}
.link-btn{flex:1;min-width:140px;text-align:center;background:#0a0a20;border:1px solid #333;color:#88DDFF;font-size:10px;padding:12px 8px;text-decoration:none;border-radius:3px;}
.link-btn:hover{border-color:#00FF88;color:#00FF88;}
.link-btn.gold{color:#FFD700;}
#statusbar{background:#1a0e05;border-top:3px solid #3a2010;padding:10px 16px;display:flex;justify-content:space-between;}
.st{font-size:10px;color:#FFD700;}
.dot{display:inline-block;width:10px;height:10px;background:#00FF88;border-radius:50%;animation:dp 1s infinite;margin-right:6px;vertical-align:middle;}
@keyframes dp{0%,100%{opacity:1;}50%{opacity:.2;}}
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <span>★ LondonKelly AI 辦公室</span>
    <span id="clock"></span>
  </div>
  <canvas id="C" width="720" height="420"></canvas>
  <div id="bottom">
    <div id="logbox">
      <div id="logtitle">&gt;_ 實時 log</div>
      <div id="loglines"></div>
    </div>
    <div id="agentlist">
      <div id="alisttitle">agents</div>
      <div id="alistrows"></div>
    </div>
  </div>
  <div id="links">
    <a href="report.html" class="link-btn gold">📊 週報 中文</a>
    <a href="report_kr.html" class="link-btn gold">🇰🇷 週報 한국어</a>
    <a href="content.html" class="link-btn">✍️ 本週內容</a>
  </div>
  <div id="statusbar">
    <span class="st" id="lastrun">載入中...</span>
    <span class="st"><span class="dot"></span>每日 06:00 HKT</span>
  </div>
</div>
<script>
const canvas=document.getElementById('C'),ctx=canvas.getContext('2d');
const W=720,H=420,S=3;

function drawWoodTile(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#C4955A';ctx.fillRect(x,y,16*S,16*S);
  const g=['#A87A40','#B8894F','#A07038','#BF9156'];
  for(let i=0;i<4;i++){ctx.fillStyle=g[i%4];ctx.fillRect(x,y+(3+i*4)*S,16*S,S);}
  ctx.fillStyle='#8B6030';ctx.fillRect(x,y,16*S,S);ctx.fillRect(x,y,S,16*S);
  ctx.fillStyle='#D4A566';ctx.fillRect(x+S,y+S,14*S,S);
}
function drawBrickTile(tx,ty,off){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#5C3A1E';ctx.fillRect(x,y,16*S,16*S);
  ctx.fillStyle='#7A5535';ctx.fillRect(x,y+6*S,16*S,2*S);ctx.fillRect(x,y+14*S,16*S,2*S);
  if(off===0){
    ctx.fillStyle='#8B4513';ctx.fillRect(x+S,y+S,6*S,4*S);ctx.fillRect(x+9*S,y+S,6*S,4*S);
    ctx.fillStyle='#7A3A10';ctx.fillRect(x+S,y+S,6*S,S);
    ctx.fillStyle='#8B4513';ctx.fillRect(x+S,y+8*S,14*S,5*S);
    ctx.fillStyle='#7A3A10';ctx.fillRect(x+S,y+8*S,14*S,S);
  }else{
    ctx.fillStyle='#8B4513';ctx.fillRect(x,y+S,4*S,4*S);ctx.fillRect(x+6*S,y+S,8*S,4*S);
    ctx.fillStyle='#7A3A10';ctx.fillRect(x+6*S,y+S,8*S,S);
    ctx.fillStyle='#8B4513';ctx.fillRect(x+4*S,y+8*S,10*S,5*S);
    ctx.fillStyle='#7A3A10';ctx.fillRect(x+4*S,y+8*S,10*S,S);
  }
}
function drawCarpetTile(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle=(tx+ty)%2===0?'#3D2B5E':'#342558';ctx.fillRect(x,y,16*S,16*S);
  ctx.fillStyle='#4A3570';ctx.fillRect(x+3*S,y+3*S,10*S,10*S);
  ctx.fillStyle='#5A4580';ctx.fillRect(x+6*S,y+6*S,4*S,4*S);
}
function drawGreenTile(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle=(tx+ty)%2===0?'#2A4A2A':'#234023';ctx.fillRect(x,y,16*S,16*S);
  ctx.fillStyle='#1a3a1a';ctx.fillRect(x,y,16*S,S);ctx.fillRect(x,y,S,16*S);
}
function drawScene(){
  for(let tx=0;tx<32;tx++)for(let ty=0;ty<20;ty++)drawWoodTile(tx,ty);
  for(let tx=32;tx<45;tx++)for(let ty=0;ty<14;ty++)drawCarpetTile(tx,ty);
  for(let tx=32;tx<45;tx++)for(let ty=14;ty<28;ty++)drawGreenTile(tx,ty);
  for(let tx=0;tx<32;tx++)for(let ty=0;ty<2;ty++)drawBrickTile(tx,ty,tx%2);
  ctx.fillStyle='#3a2010';ctx.fillRect(32*16*S,0,S*3,H);
  ctx.fillStyle='#5a3020';ctx.fillRect(32*16*S+S,0,S,H);
  drawDesk(1,3,'花花',agents[0].state);drawDesk(7,3,'阿鼻',agents[1].state);
  drawDesk(13,3,'豆芽',agents[2].state);drawDesk(19,3,'啾皮',agents[3].state);
  drawDesk(1,11,'咕嚕',agents[4].state);drawDesk(7,11,'彩彩',agents[5].state);
  drawDesk(13,11,'咕噹',agents[6].state);drawDesk(19,11,'蜜醬',agents[7].state);
  drawCoffeeMachine(33,2);drawTV(33,9);drawSofa(33,13);
  drawMeetingTable(33,19);drawClawMachine(39,2);
  drawToilet(33,15);drawSink(37,15);
  drawPlant(29,2);drawPlant(29,11);
  ctx.fillStyle='#FFD700';ctx.font=`${S*3}px "Press Start 2P",monospace`;
  ctx.fillText('休息室',34*16*S,S*12);
  ctx.fillStyle='#88FFAA';ctx.fillText('洗手間',34*16*S,15*16*S+S*6);
  ctx.fillStyle='#6B4A2A';ctx.fillRect(32*16*S-S,6*16*S,S*4,4*16*S);ctx.fillRect(32*16*S-S,18*16*S,S*4,4*16*S);
  ctx.fillStyle='#FFD700';ctx.fillRect(32*16*S+S,8*16*S,S*2,S*2);ctx.fillRect(32*16*S+S,20*16*S,S*2,S*2);
}
function drawDesk(tx,ty,name,status){
  const x=tx*16*S,y=ty*16*S;
  const g=status==='done'||status==='working';
  ctx.fillStyle='#8B6A40';ctx.fillRect(x,y,8*16*S,5*16*S);
  ctx.fillStyle='#7A5930';ctx.fillRect(x+S,y+S,(8*16-2)*S,(5*16-2)*S);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(x,y+5*16*S,8*16*S,S*2);
  ctx.fillStyle='#222';ctx.fillRect(x+2*16*S,y+S*4,4*16*S,3*16*S);
  ctx.fillStyle=g?'#0a2a1a':'#111';ctx.fillRect(x+2*16*S+S*2,y+S*6,(4*16-4)*S,(3*16-4)*S);
  if(g){
    const p=0.3+0.2*Math.sin(Date.now()/500);
    ctx.fillStyle=`rgba(0,255,136,${p})`;ctx.fillRect(x+2*16*S+S*2,y+S*6,(4*16-4)*S,(3*16-4)*S);
    ctx.fillStyle='rgba(0,255,136,0.6)';
    ctx.fillRect(x+2*16*S+S*3,y+S*8,(4*16-8)*S,S);
    ctx.fillRect(x+2*16*S+S*3,y+S*10,(4*16-10)*S,S);
    ctx.fillRect(x+2*16*S+S*3,y+S*12,(4*16-6)*S,S);
  }
  ctx.fillStyle='#333';ctx.fillRect(x+4*16*S-S,y+4*16*S-S*2,S*2,S*4);ctx.fillRect(x+3*16*S,y+4*16*S+S*2,4*S*4,S*2);
  ctx.fillStyle='#2a2a2a';ctx.fillRect(x+S*4,y+4*16*S,7*16*S-S*8,S*6);
  ctx.fillStyle='#3a3a3a';for(let k=0;k<10;k++)ctx.fillRect(x+S*5+k*(S*5),y+4*16*S+S,S*4,S*4);
  const dc=status==='working'?'#FFD700':status==='done'?'#00FF88':'#444';
  ctx.fillStyle=dc;ctx.beginPath();ctx.arc(x+S*3,y+S*3,S*1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(x,y+5*16*S-S*8,8*16*S,S*8);
  ctx.fillStyle='#FFD700';ctx.font=`${S*2}px "Press Start 2P",monospace`;ctx.fillText(name,x+S*3,y+5*16*S-S*2);
}
function drawCoffeeMachine(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(x,y,5*16*S,7*16*S);
  ctx.fillStyle='#cc2200';ctx.fillRect(x+S*2,y+S*3,5*16*S-S*4,3*16*S);
  ctx.fillStyle='#ff4400';ctx.fillRect(x+S*3,y+S*4,5*16*S-S*6,3*16*S-S*2);
  ctx.fillStyle='#00ff88';ctx.fillRect(x+S*4,y+S*5,S*3,S*3);
  ctx.fillStyle='#ffaa00';ctx.fillRect(x+S*8,y+S*5,S*3,S*3);
  ctx.fillStyle='#888';ctx.fillRect(x+S*4,y+6*16*S-S*4,S*14,S*6);
  ctx.fillStyle='rgba(200,200,200,0.4)';
  ctx.beginPath();ctx.arc(x+S*8,y+S*2,S*2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+S*11,y+S,S*1.5,0,Math.PI*2);ctx.fill();
}
function drawTV(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#111';ctx.fillRect(x,y,8*16*S,4*16*S);
  ctx.fillStyle='#0a1a2a';ctx.fillRect(x+S*2,y+S*2,8*16*S-S*4,4*16*S-S*4);
  ctx.fillStyle='#0044aa';ctx.fillRect(x+S*4,y+S*4,8*16*S-S*8,4*16*S-S*8);
}
function drawSofa(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#8B3A0A';ctx.fillRect(x,y,9*16*S,4*16*S);
  ctx.fillStyle='#A04515';ctx.fillRect(x,y,9*16*S,S*8);ctx.fillRect(x,y,S*8,4*16*S);ctx.fillRect(x+9*16*S-S*8,y,S*8,4*16*S);
  ctx.fillStyle='#C05A20';ctx.fillRect(x+S*8,y+S*8,3*16*S,2*16*S);ctx.fillRect(x+5*16*S,y+S*8,3*16*S,2*16*S);
}
function drawMeetingTable(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#5a3a18';ctx.fillRect(x,y,12*16*S,4*16*S);
  ctx.fillStyle='#6a4a28';ctx.fillRect(x+S*2,y+S*2,12*16*S-S*4,4*16*S-S*4);
  ctx.fillStyle='#3a2810';
  for(let i=0;i<4;i++){ctx.fillRect(x+i*3*16*S+S*4,y-S*6,2*16*S,S*6);ctx.fillRect(x+i*3*16*S+S*4,y+4*16*S,2*16*S,S*6);}
}
function drawClawMachine(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#1a1aaa';ctx.fillRect(x,y,6*16*S,8*16*S);
  ctx.fillStyle='#5555ff';ctx.fillRect(x+S*2,y+S*4,6*16*S-S*4,5*16*S);
  ctx.fillStyle='rgba(150,200,255,0.2)';ctx.fillRect(x+S*2,y+S*4,6*16*S-S*4,5*16*S);
  const tc=['#ff66aa','#ffaa00','#66ffaa','#ff4444','#aaaaff','#ffff44'];
  for(let i=0;i<6;i++){ctx.fillStyle=tc[i];ctx.beginPath();ctx.arc(x+S*4+i*S*8,y+4*16*S+S*12,S*4,0,Math.PI*2);ctx.fill();}
}
function drawToilet(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#eee';ctx.fillRect(x,y,3*16*S,5*16*S);
  ctx.fillStyle='#ddd';ctx.fillRect(x,y,3*16*S,S*6);
  ctx.fillStyle='#bbb';ctx.fillRect(x+S*3,y+S*6,3*16*S-S*6,5*16*S-S*6);
}
function drawSink(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#ddd';ctx.fillRect(x,y,3*16*S,2*16*S);
  ctx.fillStyle='#ccc';ctx.fillRect(x+S*2,y+S*2,3*16*S-S*4,2*16*S-S*4);
  ctx.fillStyle='#888';ctx.fillRect(x+S*10,y-S*2,S*3,S*4);
  ctx.fillStyle='#99bbcc';ctx.fillRect(x,y-3*16*S,3*16*S,2*16*S);
  ctx.strokeStyle='#888';ctx.lineWidth=S;ctx.strokeRect(x,y-3*16*S,3*16*S,2*16*S);
}
function drawPlant(tx,ty){
  const x=tx*16*S,y=ty*16*S;
  ctx.fillStyle='#4a3010';ctx.fillRect(x+S*4,y+3*16*S-S*4,S*8,S*8);
  ctx.fillStyle='#2a5a10';ctx.beginPath();ctx.arc(x+S*8,y+2*16*S,S*8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a7a18';ctx.beginPath();ctx.arc(x+S*5,y+2*16*S+S*3,S*6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+S*11,y+2*16*S+S*3,S*6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a9020';ctx.beginPath();ctx.arc(x+S*8,y+16*S,S*7,0,Math.PI*2);ctx.fill();
}
function drawPerson(x,y,col,frame,dir,sitting){
  ctx.save();ctx.translate(Math.round(x),Math.round(y));
  if(dir<0)ctx.scale(-1,1);
  function p(px,py,c){ctx.fillStyle=c;ctx.fillRect(px*S,py*S,S,S);}
  function row(a,b,py,c){for(let i=a;i<=b;i++)p(i,py,c);}
  function col2(a,b,px,c){for(let i=a;i<=b;i++)p(px,i,c);}
  const wf=frame%4;
  const la=sitting?0:Math.round(Math.sin(wf*Math.PI/2)*1.5);
  const ra=sitting?0:Math.round(-Math.sin(wf*Math.PI/2)*1.5);
  const ll=sitting?0:Math.round(Math.sin(wf*Math.PI/2)*2);
  const rl=sitting?0:Math.round(-Math.sin(wf*Math.PI/2)*2);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(S*3,S*18,S*4,S*1.5,0,0,Math.PI*2);ctx.fill();
  row(1,5,0,col.hair);row(1,5,1,col.hair);p(0,1,col.hair);p(6,1,col.hair);
  row(1,5,2,col.skin);row(1,5,3,col.skin);row(1,5,4,col.skin);
  p(2,3,'#1a1a1a');p(3,3,'#1a1a1a');p(4,4,'#cc4444');
  p(0,3,col.skin);p(6,3,col.skin);p(2,5,col.skin);p(3,5,col.skin);p(4,5,col.skin);
  row(1,5,6,col.shirt);row(1,5,7,col.shirt);row(1,5,8,col.shirt);row(1,5,9,col.shirt);row(1,5,10,col.shirt);
  col2(6+la,10+la,0,col.skin);p(0,11+la,col.skin);
  col2(6+ra,10+ra,6,col.skin);p(6,11+ra,col.skin);
  if(sitting){
    row(2,3,11,col.pants);row(2,3,12,col.pants);row(4,5,11,col.pants);row(4,5,12,col.pants);
    row(0,3,13,col.shoe);row(3,6,13,col.shoe);
  }else{
    col2(11,14+ll,1,col.pants);col2(11,14+ll,2,col.pants);p(2,15+ll,col.shoe);p(1,15+ll,col.shoe);
    col2(11,14+rl,4,col.pants);col2(11,14+rl,5,col.pants);p(4,15+rl,col.shoe);p(5,15+rl,col.shoe);
  }
  ctx.restore();
}
function drawBubble(x,y,text,color){
  if(!text)return;
  ctx.font=`${S*2}px "Press Start 2P",monospace`;
  const tw=ctx.measureText(text).width,bw=tw+S*4,bh=S*6;
  const bx=x-bw/2,by=y-bh-S*4;
  ctx.fillStyle='rgba(5,5,15,0.95)';
  if(ctx.roundRect)ctx.roundRect(bx,by,bw,bh,S);else ctx.rect(bx,by,bw,bh);
  ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(5,5,15,0.95)';ctx.beginPath();
  ctx.moveTo(x-S*2,by+bh);ctx.lineTo(x,by+bh+S*4);ctx.lineTo(x+S*2,by+bh);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.beginPath();
  ctx.moveTo(x-S*2,by+bh);ctx.lineTo(x,by+bh+S*4);ctx.lineTo(x+S*2,by+bh);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`${S*2}px "Press Start 2P",monospace`;ctx.fillText(text,bx+S*2,by+bh-S);
}

const PCOLS=[
  {skin:'#FFCCAA',hair:'#2a1000',shirt:'#dd3333',pants:'#223399',shoe:'#1a1a2a'},
  {skin:'#FFCCAA',hair:'#1a1a1a',shirt:'#9933dd',pants:'#1a3300',shoe:'#2a1a00'},
  {skin:'#FFDDBB',hair:'#3a1800',shirt:'#ee7700',pants:'#331100',shoe:'#1a1000'},
  {skin:'#FFD0AA',hair:'#2a1800',shirt:'#1177dd',pants:'#001133',shoe:'#001122'},
  {skin:'#FFCCAA',hair:'#1a0000',shirt:'#dd4488',pants:'#330011',shoe:'#1a0011'},
  {skin:'#FFDDCC',hair:'#001a00',shirt:'#33aa33',pants:'#001100',shoe:'#001100'},
  {skin:'#FFCC99',hair:'#002a2a',shirt:'#009999',pants:'#001a1a',shoe:'#002222'},
  {skin:'#FFD0AA',hair:'#1a1a00',shirt:'#ddcc00',pants:'#1a1a00',shoe:'#0a0a00'},
];
const DP=[
  {ax:1*16*S+4*S,ay:3*16*S+5*16*S},{ax:7*16*S+4*S,ay:3*16*S+5*16*S},
  {ax:13*16*S+4*S,ay:3*16*S+5*16*S},{ax:19*16*S+4*S,ay:3*16*S+5*16*S},
  {ax:1*16*S+4*S,ay:11*16*S+5*16*S},{ax:7*16*S+4*S,ay:11*16*S+5*16*S},
  {ax:13*16*S+4*S,ay:11*16*S+5*16*S},{ax:19*16*S+4*S,ay:11*16*S+5*16*S},
];
const AINFO=[
  {name:'花花',status:'done'},{name:'阿鼻',status:'done'},
  {name:'豆芽',status:'done'},{name:'啾皮',status:'done'},
  {name:'咕嚕',status:'done'},{name:'彩彩',status:'idle'},
  {name:'咕噹',status:'idle'},{name:'蜜醬',status:'working'},
];
const WB=['排序中...','拉GA4','計算分數','更新tags'];
const IB=['zzz','等指令','發呆中','無野做'];
const CB=['好香☕','補充能量','喝完返工'];
const TB=['去一去','解決咗','返黎啦'];
const DB=['✓完成','搞掂!','去休息'];
const RB=['出週報!','ROAS35x','分析中'];
const CB2=['寫文案!','7日內容','IG post!'];
const IXB=['提交URL!','200個/日','索引中!'];
const SC={working:'#FFD700',done:'#00FF88',idle:'#555',coffee:'#FF8800',toilet:'#88DDFF'};

const agents=AINFO.map((a,i)=>({
  id:i,name:a.name,baseStatus:a.status,col:PCOLS[i],
  deskX:DP[i].ax,deskY:DP[i].ay,x:DP[i].ax,y:DP[i].ay,tx:DP[i].ax,ty:DP[i].ay,
  state:a.status,bubble:'',bubbleTimer:0,
  actionTimer:60+Math.floor(Math.random()*200),
  walkFrame:0,walkTimer:0,dir:1,moving:false,sitting:false,speed:1.2+Math.random()*0.6,
}));

let realStatus=null;
async function fetchStatus(){
  try{
    const r=await fetch('status.json?t='+Date.now());
    realStatus=await r.json();
    updateFromStatus();
  }catch(e){}
}
function toHKT(s){
  const dt=new Date(s),hk=new Date(dt.getTime()+8*3600000);
  return hk.toISOString().slice(0,16).replace('T',' ')+' HKT';
}
function updateFromStatus(){
  if(!realStatus)return;
  const sa=realStatus.agents||{};
  const wr=realStatus.weekly_report||{};
  const ca=realStatus.content_agent||{};
  const ix=realStatus.indexing||{};
  if(realStatus.last_run)document.getElementById('lastrun').textContent='上次: '+toHKT(realStatus.last_run)+' ✓';
  if(sa.sort_collections)agents[0].baseStatus=sa.sort_collections.status==='done'?'done':'idle';
  if(sa.update_hot_items)agents[1].baseStatus=sa.update_hot_items.status==='done'?'done':'idle';
  if(wr.status==='done')agents[2].baseStatus='done';
  if(ca.status==='done')agents[3].baseStatus='done';
  if(ix.status==='done')agents[4].baseStatus='done';
  const logEl=document.getElementById('loglines');
  logEl.innerHTML='';
  if(realStatus.last_run)addLog('lk-info','[系統] '+toHKT(realStatus.last_run));
  if(sa.sort_collections)addLog('lk-ok','[花花] 排序 ✓');
  if(sa.update_hot_items)addLog('lk-ok','[阿鼻] Hot items ✓');
  if(wr.last_run)addLog('lk-ok','[豆芽] 週報: '+toHKT(wr.last_run)+' ✓');
  if(ca.last_run)addLog('lk-ok','[啾皮] 內容: '+toHKT(ca.last_run)+' ✓');
  if(ix.last_run)addLog('lk-ok','[咕嚕] Indexing: '+toHKT(ix.last_run)+' ✓');
  addLog('lk-warn','[系統] 下次: 明日 06:00 HKT');
}
function addLog(cls,txt){
  const logEl=document.getElementById('loglines');
  const div=document.createElement('div');div.className=cls;div.textContent=txt;
  logEl.appendChild(div);
  while(logEl.children.length>7)logEl.removeChild(logEl.firstChild);
}
fetchStatus();setInterval(fetchStatus,300000);

function pb(s,id){
  if(s==='working')return WB[Math.floor(Math.random()*WB.length)];
  if(s==='coffee')return CB[Math.floor(Math.random()*CB.length)];
  if(s==='toilet')return TB[Math.floor(Math.random()*TB.length)];
  if(s==='done'&&id===2)return RB[Math.floor(Math.random()*RB.length)];
  if(s==='done'&&id===3)return CB2[Math.floor(Math.random()*CB2.length)];
  if(s==='done'&&id===4)return IXB[Math.floor(Math.random()*IXB.length)];
  if(s==='done')return DB[Math.floor(Math.random()*DB.length)];
  return IB[Math.floor(Math.random()*IB.length)];
}
const CZ={x:34*16*S,y:4*16*S},TZ={x:34*16*S,y:17*16*S};
function agentTick(a){
  a.actionTimer--;if(a.bubbleTimer>0)a.bubbleTimer--;
  if(a.actionTimer<=0){
    const r=Math.random();
    if(a.baseStatus==='working'){
      a.state='working';a.tx=a.deskX;a.ty=a.deskY;a.bubble=pb('working');a.bubbleTimer=140;a.actionTimer=180;
    }else if(a.baseStatus==='done'){
      if(r<0.45){a.state='done';a.tx=a.deskX;a.ty=a.deskY;a.bubble=pb('done',a.id);a.bubbleTimer=100;a.actionTimer=220;}
      else if(r<0.7){a.state='coffee';a.tx=CZ.x+Math.random()*40;a.ty=CZ.y+Math.random()*40;a.bubble=pb('coffee');a.bubbleTimer=120;a.actionTimer=200;}
      else{a.state='done';a.tx=30+Math.random()*28*16*S;a.ty=30+Math.random()*17*16*S;a.bubble='';a.actionTimer=150;}
    }else{
      if(r<0.35){a.state='idle';a.tx=a.deskX;a.ty=a.deskY;a.bubble=pb('idle');a.bubbleTimer=110;a.actionTimer=250;}
      else if(r<0.55){a.state='coffee';a.tx=CZ.x+Math.random()*40;a.ty=CZ.y+Math.random()*40;a.bubble=pb('coffee');a.bubbleTimer=120;a.actionTimer=220;}
      else if(r<0.7){a.state='toilet';a.tx=TZ.x+Math.random()*30;a.ty=TZ.y+Math.random()*30;a.bubble=pb('toilet');a.bubbleTimer=110;a.actionTimer=240;}
      else{a.state='idle';a.tx=30+Math.random()*28*16*S;a.ty=30+Math.random()*17*16*S;a.bubble='';a.actionTimer=180;}
    }
  }
  const dx=a.tx-a.x,dy=a.ty-a.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>3){
    a.x+=dx/dist*a.speed;a.y+=dy/dist*a.speed;a.moving=true;
    if(dx!==0)a.dir=dx>0?1:-1;
    a.walkTimer++;if(a.walkTimer%10===0)a.walkFrame=(a.walkFrame+1)%4;
  }else{a.x=a.tx;a.y=a.ty;a.moving=false;a.walkFrame=0;}
  a.sitting=!a.moving;
}
const logEl2=document.getElementById('loglines');
const LOGS=[
  {c:'lk-info',t:'[06:00] GitHub Actions 啟動'},
  {c:'lk-ok',t:'[06:02] GA4 key 載入 ✓'},
  {c:'lk-ok',t:'[06:04] sort_collections 成功 ✓'},
  {c:'lk-ok',t:'[06:06] Hot collection 更新 ✓'},
  {c:'lk-ok',t:'[09:00] Indexing 200個URL ✓'},
  {c:'lk-warn',t:'[系統] 下次: 明日 06:00 HKT'},
];
let li=0;
function addFakeLog(){
  if(realStatus)return;
  const d=LOGS[li%LOGS.length];li++;
  const div=document.createElement('div');div.className=d.c;div.textContent=d.t;
  logEl2.appendChild(div);
  while(logEl2.children.length>6)logEl2.removeChild(logEl2.firstChild);
  setTimeout(addFakeLog,3000);
}
setTimeout(addFakeLog,800);

const alistEl=document.getElementById('alistrows');
function updateAlist(){
  alistEl.innerHTML=agents.map(a=>`<div class="alist-row"><div class="alist-dot" style="background:${SC[a.state]||'#555'}"></div><span class="alist-name">${a.name} ${a.state==='working'?'▶':a.state==='done'?'✓':a.state==='coffee'?'☕':a.state==='toilet'?'🚽':'…'}</span></div>`).join('');
}
function updateClock(){
  const now=new Date(),hk=new Date(now.getTime()+8*3600000);
  document.getElementById('clock').textContent=hk.toISOString().slice(11,19)+' HKT';
}
setInterval(updateClock,1000);updateClock();

function loop(){
  ctx.clearRect(0,0,W,H);
  drawScene();
  agents.forEach(a=>agentTick(a));
  [...agents].sort((a,b)=>a.y-b.y).forEach(a=>{
    drawPerson(a.x,a.y,a.col,a.walkFrame,a.dir,a.sitting);
    if(a.bubble&&a.bubbleTimer>0)drawBubble(a.x+S*3,a.y,a.bubble,SC[a.state]||'#00FF88');
  });
  updateAlist();
  requestAnimationFrame(loop);
}
function resize(){
  const w=document.getElementById('wrap').offsetWidth;
  canvas.style.height=Math.round(H*(w/W))+'px';
}
resize();window.addEventListener('resize',resize);
loop();
</script>
</body>
</html>
