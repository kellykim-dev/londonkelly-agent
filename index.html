<script>
const W=960,H=540;
const cv=document.getElementById('oc');
const cx=cv.getContext('2d');

const AC=new (window.AudioContext||window.webkitAudioContext)();
function playDone(){
  const t=AC.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(0,t+i*0.12);
    g.gain.linearRampToValueAtTime(0.18,t+i*0.12+0.05);
    g.gain.linearRampToValueAtTime(0,t+i*0.12+0.22);
    o.start(t+i*0.12);o.stop(t+i*0.12+0.25);
  });
}
function playNotif(){
  const t=AC.currentTime;
  [880,1100].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='triangle';
    g.gain.setValueAtTime(0,t+i*0.1);
    g.gain.linearRampToValueAtTime(0.12,t+i*0.1+0.04);
    g.gain.linearRampToValueAtTime(0,t+i*0.1+0.18);
    o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
  });
}
document.addEventListener('click',()=>AC.resume(),{once:true});

function showToast(msg,type){
  const el=document.createElement('div');
  el.className='notif-toast';
  const isDone=type==='done';
  el.style.cssText='border:1.5px solid '+(isDone?'#4caf50':'#ff9800')+';background:'+(isDone?'#0f1f0f':'#1f140a')+';color:'+(isDone?'#c8ffc8':'#ffe0b0')+';';
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  if(isDone)playDone(); else playNotif();
  setTimeout(()=>el.remove(),4200);
}

// ═══════════════════════════════════════════════════════
// RPG PIXEL ART v3 — Refined Detail
// ═══════════════════════════════════════════════════════

function rr(x,y,w,h,r,fill,stroke,lw){
  cx.beginPath();cx.roundRect(x,y,w,h,r);
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1;cx.stroke();}
}

// pixel-crisp helper (snap to integer)
function px(n){return Math.round(n);}

// ── ISOMETRIC WOOD FLOOR ─────────────────────────────
function drawWoodFloor(fx,fy,fw,fh){
  // base warm tone
  cx.fillStyle='#c8965a'; cx.fillRect(fx,fy,fw,fh);
  // horizontal planks with perspective shading
  const plankH=22;
  const plankColors=['#c8965a','#c08850','#cc9a60','#ba8048','#d0a060'];
  for(let row=0;row*plankH<fh;row++){
    const py2=fy+row*plankH;
    const col=plankColors[row%plankColors.length];
    cx.fillStyle=col; cx.fillRect(fx,py2,fw,plankH);
    // plank top highlight
    cx.fillStyle='rgba(255,255,255,0.07)'; cx.fillRect(fx,py2,fw,3);
    // plank bottom shadow
    cx.fillStyle='rgba(0,0,0,0.10)'; cx.fillRect(fx,py2+plankH-3,fw,3);
    // horizontal divider line
    cx.strokeStyle='#8a5828'; cx.lineWidth=1;
    cx.beginPath();cx.moveTo(fx,py2+plankH);cx.lineTo(fx+fw,py2+plankH);cx.stroke();
  }
  // vertical seam lines (staggered like real planks)
  const plankW=80;
  for(let row=0;row*plankH<fh;row++){
    const offset=(row%2)*40;
    for(let col=0;col*plankW<fw+plankW;col++){
      const sx=fx+col*plankW+offset;
      cx.strokeStyle='rgba(100,60,20,0.25)'; cx.lineWidth=1;
      cx.beginPath();cx.moveTo(sx,fy+row*plankH);cx.lineTo(sx,fy+row*plankH+plankH);cx.stroke();
    }
  }
  // subtle grain across planks
  cx.strokeStyle='rgba(140,80,30,0.08)'; cx.lineWidth=0.8;
  for(let row=0;row*plankH<fh;row++){
    for(let g=0;g<4;g++){
      const gx=fx+Math.sin(row*7+g*30)*15+g*(fw/4)+20;
      cx.beginPath();cx.moveTo(gx,fy+row*plankH+4);cx.lineTo(gx+8,fy+row*plankH+plankH-4);cx.stroke();
    }
  }
}

// ── DARK TILE FLOOR (break room) ─────────────────────
function drawDarkTileFloor(fx,fy,fw,fh){
  cx.fillStyle='#1e1830'; cx.fillRect(fx,fy,fw,fh);
  const tw=36,th=36;
  for(let ty=0;ty<fh;ty+=th){
    for(let tx=0;tx<fw;tx+=tw){
      const even=(Math.floor(tx/tw)+Math.floor(ty/th))%2===0;
      cx.fillStyle=even?'#2a2244':'#221c3a';
      cx.fillRect(fx+tx,fy+ty,tw,th);
      // tile border
      cx.strokeStyle='rgba(80,60,120,0.6)'; cx.lineWidth=1;
      cx.strokeRect(fx+tx+0.5,fy+ty+0.5,tw-1,th-1);
      // subtle corner dots
      if(even){
        cx.fillStyle='rgba(120,100,180,0.3)';
        cx.fillRect(fx+tx+1,fy+ty+1,2,2);
      }
    }
  }
  // purple ambient glow from ceiling
  const glow=cx.createRadialGradient(fx+fw/2,fy,20,fx+fw/2,fy,fh);
  glow.addColorStop(0,'rgba(120,80,200,0.12)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=glow; cx.fillRect(fx,fy,fw,fh);
}

// ── WALL with thickness ───────────────────────────────
function drawWallSection(wx,wy,ww,wh){
  // wall fill
  cx.fillStyle='#e8dcc8'; cx.fillRect(wx,wy,ww,wh);
  // wall top strip (ceiling line)
  cx.fillStyle='#d0c4b0'; cx.fillRect(wx,wy,ww,10);
  cx.fillStyle='#b8ac98'; cx.fillRect(wx,wy+9,ww,2);
  // baseboard
  cx.fillStyle='#c8b8a0'; cx.fillRect(wx,wy+wh-10,ww,10);
  cx.fillStyle='#a89880'; cx.fillRect(wx,wy+wh-11,ww,2);
  cx.fillStyle='rgba(255,255,255,0.08)'; cx.fillRect(wx,wy+wh-10,ww,3);
}

// ── BOOKSHELF (detailed) ─────────────────────────────
function drawBookshelf(bx,by,wide){
  const sw=wide?196:98, sh=68;
  // back panel + shadow
  cx.fillStyle='rgba(0,0,0,0.18)'; cx.fillRect(bx+3,by+3,sw,sh);
  // main body
  cx.fillStyle='#5c3a1a'; cx.fillRect(bx,by,sw,sh);
  // top panel highlight
  cx.fillStyle='#7a5030'; cx.fillRect(bx,by,sw,6);
  cx.fillStyle='rgba(255,255,255,0.15)'; cx.fillRect(bx+2,by+1,sw-4,3);
  // side panels
  cx.fillStyle='#6a4020'; cx.fillRect(bx,by,5,sh); cx.fillRect(bx+sw-5,by,5,sh);

  const shelves=2;
  const bkColors=['#e74c3c','#3498db','#27ae60','#f39c12','#8e44ad','#16a085','#d35400','#c0392b','#2980b9','#1abc9c','#e67e22','#7f8c8d'];
  for(let s=0;s<shelves;s++){
    const sy=by+8+s*29;
    // shelf board
    cx.fillStyle='#8b6035'; cx.fillRect(bx+3,sy+20,sw-6,5);
    cx.fillStyle='rgba(255,255,255,0.12)'; cx.fillRect(bx+3,sy+20,sw-6,2);
    cx.fillStyle='rgba(0,0,0,0.2)'; cx.fillRect(bx+3,sy+23,sw-6,2);

    // books
    const bcount=wide?13:6;
    const bslotW=(sw-10)/bcount;
    for(let b=0;b<bcount;b++){
      const ex=px(bx+7+b*bslotW);
      const bw=px(bslotW-2);
      const bh=px(10+Math.sin(b*1.7+s*2.3+bx)*5);
      const bc=bkColors[(b+s*3+Math.floor(bx/50))%bkColors.length];
      // book body
      cx.fillStyle=bc; cx.fillRect(ex,sy+20-bh,bw,bh);
      // spine highlight (left edge)
      cx.fillStyle='rgba(255,255,255,0.25)'; cx.fillRect(ex,sy+20-bh,2,bh);
      // spine shadow (right edge)
      cx.fillStyle='rgba(0,0,0,0.25)'; cx.fillRect(ex+bw-2,sy+20-bh,2,bh);
      // page top
      cx.fillStyle='rgba(255,255,240,0.7)'; cx.fillRect(ex+1,sy+20-bh,bw-2,2);
      // thin book separator
      cx.fillStyle='rgba(0,0,0,0.3)'; cx.fillRect(ex+bw,sy+20-bh,1,bh);
    }
  }
  // outer frame
  cx.strokeStyle='#3a2008'; cx.lineWidth=1.5; cx.strokeRect(bx,by,sw,sh);
}

// ── WINDOW ───────────────────────────────────────────
function drawWindow(wx,wy){
  // outer frame shadow
  cx.fillStyle='rgba(0,0,0,0.2)'; cx.fillRect(wx+2,wy+2,62,72);
  // frame
  cx.fillStyle='#8b6830'; cx.fillRect(wx,wy,62,72);
  // inner frame
  cx.fillStyle='#a07840'; cx.fillRect(wx+2,wy+2,58,68);
  // glass — sky gradient
  const sky=cx.createLinearGradient(wx+5,wy+5,wx+5,wy+68);
  sky.addColorStop(0,'#78c8f0'); sky.addColorStop(0.5,'#a8daf8'); sky.addColorStop(1,'#c8f0d0');
  cx.fillStyle=sky; cx.fillRect(wx+5,wy+5,52,63);
  // clouds (animated)
  const ct=Date.now()/4000;
  cx.fillStyle='rgba(255,255,255,0.95)';
  cx.beginPath();cx.ellipse(wx+16+Math.sin(ct)*4,wy+18,9,5,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(wx+22+Math.sin(ct)*4,wy+15,6,4,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(wx+40+Math.cos(ct)*3,wy+22,7,4,0,0,Math.PI*2);cx.fill();
  // ground
  cx.fillStyle='#5aaa40'; cx.fillRect(wx+5,wy+40,52,28);
  cx.fillStyle='#4a9a30'; cx.fillRect(wx+5,wy+40,52,8);
  // small tree
  cx.fillStyle='#5a3a10'; cx.fillRect(wx+42,wy+44,4,24);
  cx.fillStyle='#3a8a20'; cx.beginPath();cx.ellipse(wx+44,wy+40,10,12,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#4aaa30'; cx.beginPath();cx.ellipse(wx+44,wy+36,7,9,0,0,Math.PI*2);cx.fill();
  // window cross bars
  cx.fillStyle='#7a5820';
  cx.fillRect(wx+29,wy+5,4,63); // vertical
  cx.fillRect(wx+5,wy+37,52,4); // horizontal
  // glass reflection
  cx.fillStyle='rgba(255,255,255,0.15)';
  cx.beginPath();cx.moveTo(wx+6,wy+6);cx.lineTo(wx+22,wy+6);cx.lineTo(wx+10,wy+36);cx.lineTo(wx+6,wy+36);cx.closePath();cx.fill();
  // glow on wall
  const gl=cx.createRadialGradient(wx+31,wy+36,5,wx+31,wy+36,50);
  gl.addColorStop(0,'rgba(180,220,255,0.18)'); gl.addColorStop(1,'rgba(180,220,255,0)');
  cx.fillStyle=gl; cx.fillRect(wx-20,wy-10,100,90);
}

// ── WALL PAINTING ────────────────────────────────────
function drawPainting(px2,py2){
  // shadow
  cx.fillStyle='rgba(0,0,0,0.2)'; cx.fillRect(px2+3,py2+3,82,54);
  // frame
  cx.fillStyle='#b8902a'; cx.fillRect(px2,py2,82,54);
  cx.fillStyle='#d4a840'; cx.fillRect(px2+2,py2+2,78,50);

// ── DESK (isometric feel) ────────────────────────────
function drawRPGDesk(dx,dy,shirtCol){

  cx.strokeStyle='rgba(120,70,20,0.2)'; cx.lineWidth=1;

  // terminal content
  cx.fillStyle='#00e878'; cx.font='5px monospace'; cx.textAlign='left';

  // key rows
  for(let row=0;row<2;row++){
    for(let k=0;k<7;k++){
      cx.fillStyle='#c8c4bc'; cx.fillRect(dx+10+k*6,dy+37+row*4,5,3);

    }

  cx.fillStyle='rgba(0,0,0,0.15)'; cx.fillRect(dx+59,dy+38,1,9); // scroll line

  // ── MUG ──

// ── PLANT (layered detail) ────────────────────────────
function drawRPGPlant(px2,py2,size){
  size=size||1;
  const s=size;
  // pot shadow
  cx.fillStyle='rgba(0,0,0,0.18)';
  cx.beginPath();cx.ellipse(px2+2,py2+20*s,13*s,4*s,0,0,Math.PI*2);cx.fill();
  // pot body
  const potGrad=cx.createLinearGradient(px2-11*s,py2,px2+11*s,py2);
  potGrad.addColorStop(0,'#7a4e2a'); potGrad.addColorStop(0.4,'#a06a3a'); potGrad.addColorStop(1,'#7a4e2a');
  cx.fillStyle=potGrad;
  cx.beginPath();cx.moveTo(px2-11*s,py2);cx.lineTo(px2-8*s,py2+18*s);cx.lineTo(px2+8*s,py2+18*s);cx.lineTo(px2+11*s,py2);cx.closePath();cx.fill();
  // pot rim
  cx.fillStyle='#b07848'; cx.fillRect(px2-12*s,py2-4*s,24*s,7*s);
  cx.fillStyle='rgba(255,255,255,0.2)'; cx.fillRect(px2-12*s,py2-4*s,24*s,2*s);
  cx.strokeStyle='#7a4e28'; cx.lineWidth=1; cx.strokeRect(px2-12*s,py2-4*s,24*s,7*s);
  // soil
  cx.fillStyle='#2a1a08'; cx.beginPath();cx.ellipse(px2,py2+1*s,8*s,3*s,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#3a2810'; cx.beginPath();cx.ellipse(px2-2*s,py2,4*s,2*s,0.3,0,Math.PI*2);cx.fill();

  // leaves — multiple layers for depth
  const layers=[
    // [offsetX, offsetY, radiusX, radiusY, angle, darkColor, lightColor]
    [-14,-26,13,9,Math.PI/5,'#1a5228','#2a7a40'],
    [-20,-18,10,8,-Math.PI/4,'#1a5228','#2a7a40'],
    [8,-24,12,8,Math.PI/3,'#155022','#257038'],
    [16,-16,9,7,Math.PI/2,'#155022','#257038'],
    [-5,-36,8,12,-Math.PI/10,'#256030','#3a9050'],
    [4,-34,7,11,Math.PI/10,'#256030','#3a9050'],
    [-8,-30,6,10,Math.PI/6,'#2a7040','#40aa60'],
    [0,-32,9,13,0,'#2a7040','#40aa60'],
  ];
  layers.forEach(([lx,ly,lrx,lry,la,dc,lc])=>{
    // dark base leaf
    cx.fillStyle=dc;
    cx.beginPath();cx.ellipse(px2+lx*s,py2+ly*s,lrx*s,lry*s,la,0,Math.PI*2);cx.fill();
    // light highlight on leaf
    cx.fillStyle=lc;
    cx.beginPath();cx.ellipse(px2+lx*s-lrx*s*0.2,py2+ly*s-lry*s*0.2,lrx*s*0.5,lry*s*0.4,la,0,Math.PI*2);cx.fill();
    // vein
    cx.strokeStyle='rgba(255,255,255,0.2)'; cx.lineWidth=0.7*s;
    cx.beginPath();
    cx.moveTo(px2+lx*s,py2+ly*s+lry*s*0.7);
    cx.quadraticCurveTo(px2+lx*s+lrx*s*0.2,py2+ly*s,px2+lx*s,py2+ly*s-lry*s*0.7);
    cx.stroke();
  });
  // top highlight leaf
  cx.fillStyle='#50cc70';
  cx.beginPath();cx.ellipse(px2,py2-36*s,5*s,8*s,-Math.PI/12,0,Math.PI*2);cx.fill();
}

// ── WALL CLOCK ───────────────────────────────────────
function drawWallClock(clkx,clky){
  cx.fillStyle='rgba(0,0,0,0.15)'; cx.beginPath();cx.arc(clkx+2,clky+2,19,0,Math.PI*2);cx.fill();
  cx.fillStyle='#e8dcc8'; cx.beginPath();cx.arc(clkx,clky,19,0,Math.PI*2);cx.fill();
  cx.fillStyle='#d4c8b0'; cx.beginPath();cx.arc(clkx,clky,19,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#b09870'; cx.lineWidth=2; cx.beginPath();cx.arc(clkx,clky,19,0,Math.PI*2);cx.stroke();
  // hour marks
  for(let m=0;m<12;m++){
    const a=m*Math.PI/6, r=15, isHour=m%3===0;
    cx.strokeStyle=isHour?'#6a4820':'#a08060'; cx.lineWidth=isHour?1.5:0.8;
    cx.beginPath();cx.moveTo(clkx+Math.cos(a)*r,clky+Math.sin(a)*r);
    cx.lineTo(clkx+Math.cos(a)*(r-(isHour?4:2)),clky+Math.sin(a)*(r-(isHour?4:2)));cx.stroke();
  }
  const now=new Date(Date.now()+8*3600000);
  const hr=(now.getHours()%12+now.getMinutes()/60)*Math.PI/6-Math.PI/2;
  const mn=now.getMinutes()*Math.PI/30-Math.PI/2;
  const sc=now.getSeconds()*Math.PI/30-Math.PI/2;
  // hour hand
  cx.strokeStyle='#3a2810'; cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(clkx,clky);cx.lineTo(clkx+Math.cos(hr)*9,clky+Math.sin(hr)*9);cx.stroke();
  // minute hand
  cx.strokeStyle='#5a3820'; cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(clkx,clky);cx.lineTo(clkx+Math.cos(mn)*13,clky+Math.sin(mn)*13);cx.stroke();
  // second hand
  cx.strokeStyle='#e74c3c'; cx.lineWidth=0.8;
  cx.beginPath();cx.moveTo(clkx-Math.cos(sc)*4,clky-Math.sin(sc)*4);cx.lineTo(clkx+Math.cos(sc)*14,clky+Math.sin(sc)*14);cx.stroke();
  // center dot
  cx.fillStyle='#c0a070'; cx.beginPath();cx.arc(clkx,clky,2.5,0,Math.PI*2);cx.fill();
}

// ── NOTICE BOARD ─────────────────────────────────────

  rr(nbx,nby,112,78,3,'#d4a830','#a88020',2);

    {x:nbx+92,y:nby+8,c:'#80deea',t:'Blog',tc:'#004050'},
    {x:nbx+8,y:nby+44,c:'#ce93d8',t:'LK♡',tc:'#4a0060'},

    cx.fillStyle=n.tc; cx.font='bold 8px Nunito,sans-serif'; cx.textAlign='center';
    cx.fillText(n.t,n.x+17,n.y+18);
    // pin
    cx.fillStyle='#e53935'; cx.beginPath();cx.arc(n.x+17,n.y+3,3.5,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.4)'; cx.beginPath();cx.arc(n.x+16,n.y+2,1.5,0,Math.PI*2);cx.fill();
  });
}

// ── RPG CHARACTER (detailed sprite) ──────────────────
const CHAIR_COLORS=['#4a90d9','#d9504a','#4ad990','#d9a04a','#904ad9','#d94a90','#4a9090','#9090d9'];

function drawRPGChar(cx2,cy,skin,shirt,hair,female,wf,dir,name,bubble,ci){
  if(ci!==undefined) drawRPGChair(cx2,cy+16,CHAIR_COLORS[ci%8]);

  const frame=Math.floor(wf/4)%4;
  const walking=wf>0&&ci===undefined;

  cx.save();
  if(dir==='left'){cx.scale(-1,1);cx.translate(-cx2*2,0);}

  // ground shadow
  cx.fillStyle='rgba(0,0,0,0.2)';
  cx.beginPath();cx.ellipse(cx2,cy+10,11,3.5,0,0,Math.PI*2);cx.fill();

  // ── LEGS ──
  const legPhase=walking?frame:0;
  if(!female){
    // pants
    const lleg=legPhase%2===0?2:0, rleg=legPhase%2===0?0:2;
    cx.fillStyle='#3a2e1e';
    cx.fillRect(cx2-5,cy+4,5,11+lleg);  // left leg
    cx.fillRect(cx2+0,cy+4,5,11+rleg);  // right leg
    // shoes
    cx.fillStyle='#1a1208';
    cx.fillRect(cx2-6,cy+15+lleg,6,4);
    cx.fillRect(cx2+0,cy+15+rleg,6,4);
    cx.fillStyle='rgba(255,255,255,0.15)';
    cx.fillRect(cx2-6,cy+15+lleg,6,1);
    cx.fillRect(cx2+0,cy+15+rleg,6,1);
  }else{
    // skirt / dress bottom
    cx.fillStyle=shirt;
    cx.beginPath();cx.moveTo(cx2-7,cy+6);cx.lineTo(cx2-9,cy+18);cx.lineTo(cx2+9,cy+18);cx.lineTo(cx2+7,cy+6);cx.closePath();cx.fill();
    // legs
    cx.fillStyle='#f0c8a8';
    const lleg=legPhase%2===0?2:0, rleg=legPhase%2===0?0:2;
    cx.fillRect(cx2-5,cy+14,4,6+lleg);
    cx.fillRect(cx2+1,cy+14,4,6+rleg);
    // shoes/heels
    cx.fillStyle='#8a2020';
    cx.fillRect(cx2-6,cy+20+lleg,5,3);
    cx.fillRect(cx2+1,cy+20+rleg,5,3);
  }

  // ── BODY / SHIRT ──
  if(!female){
    cx.fillStyle=shirt;
    cx.fillRect(cx2-6,cy-8,12,13);
    // shirt collar area
    cx.fillStyle='rgba(255,255,255,0.2)';
    cx.fillRect(cx2-2,cy-8,4,3);
    // shirt crease/fold detail
    cx.strokeStyle='rgba(0,0,0,0.15)'; cx.lineWidth=0.8;
    cx.beginPath();cx.moveTo(cx2-2,cy-4);cx.lineTo(cx2-2,cy+4);cx.stroke();
    cx.beginPath();cx.moveTo(cx2+2,cy-4);cx.lineTo(cx2+2,cy+4);cx.stroke();
    // shirt highlight
    cx.fillStyle='rgba(255,255,255,0.15)'; cx.fillRect(cx2-5,cy-8,5,7);
  }else{
    cx.fillStyle=shirt;
    cx.fillRect(cx2-6,cy-8,12,14);
    cx.fillStyle='rgba(255,255,255,0.18)'; cx.fillRect(cx2-5,cy-8,5,7);
    // collar
    cx.fillStyle='rgba(255,255,255,0.3)';
    cx.beginPath();cx.moveTo(cx2-2,cy-8);cx.lineTo(cx2,cy-5);cx.lineTo(cx2+2,cy-8);cx.fill();
  }

  // ── ARMS ──
  const armSwing=walking?(legPhase%2===0?-2:2):0;
  cx.fillStyle=skin;
  // left arm
  cx.fillRect(cx2-9,cy-7+armSwing,4,10);
  cx.fillStyle='rgba(0,0,0,0.15)'; cx.fillRect(cx2-9,cy-7+armSwing,1,10);
  // right arm
  cx.fillStyle=skin;
  cx.fillRect(cx2+5,cy-7-armSwing,4,10);
  cx.fillStyle='rgba(0,0,0,0.1)'; cx.fillRect(cx2+8,cy-7-armSwing,1,10);
  // hands
  cx.fillStyle=skin;
  cx.beginPath();cx.arc(cx2-7,cy+4+armSwing,3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(cx2+7,cy+4-armSwing,3,0,Math.PI*2);cx.fill();

  // ── NECK ──
  cx.fillStyle=skin; cx.fillRect(cx2-3,cy-10,6,4);

  // ── HEAD ──
  // head shadow on neck
  cx.fillStyle='rgba(0,0,0,0.12)'; cx.fillRect(cx2-5,cy-19,10,3);
  // head
  cx.fillStyle=skin; cx.fillRect(cx2-6,cy-20,12,13);
  // jaw/chin rounding
  cx.fillStyle=skin;
  cx.beginPath();cx.arc(cx2,cy-7,6,0,Math.PI);cx.fill();
  // head side shading
  cx.fillStyle='rgba(0,0,0,0.08)'; cx.fillRect(cx2+5,cy-20,1,13);
  // head highlight (forehead)
  cx.fillStyle='rgba(255,255,255,0.12)'; cx.fillRect(cx2-5,cy-20,5,5);

  // ── HAIR ──
  cx.fillStyle=hair;
  if(female){
    // top hair
    cx.fillRect(cx2-7,cy-28,14,10);
    // side hair (flowing)
    cx.fillRect(cx2-9,cy-24,4,20);
    cx.fillRect(cx2+5,cy-24,4,20);
    // hair bulk bottom
    cx.beginPath();cx.arc(cx2-7,cy-4,4,0,Math.PI);cx.fill();
    cx.beginPath();cx.arc(cx2+7,cy-4,4,0,Math.PI);cx.fill();
    // fringe/bangs
    cx.fillRect(cx2-7,cy-28,14,5);
    // hair highlight
    cx.fillStyle='rgba(255,255,255,0.2)'; cx.fillRect(cx2-4,cy-28,5,3);
    // hair parting
    cx.fillStyle=hair; cx.fillRect(cx2-1,cy-28,2,8);
  }else{
    // top
    cx.fillRect(cx2-6,cy-28,12,10);
    // side tufts
    cx.fillRect(cx2-7,cy-26,3,8);
    cx.fillRect(cx2+4,cy-26,3,6);
    // fringe
    cx.fillRect(cx2-6,cy-22,4,4);
    cx.fillRect(cx2+2,cy-22,4,4);
    // highlight
    cx.fillStyle='rgba(255,255,255,0.18)'; cx.fillRect(cx2-3,cy-28,4,3);
  }

  // ── FACE DETAILS ──
  // eyes (whites)
  cx.fillStyle='#f8f8f8'; cx.fillRect(cx2-4,cy-17,4,3); cx.fillRect(cx2+0,cy-17,4,3);
  // pupils
  cx.fillStyle='#1a0a00'; cx.fillRect(cx2-3,cy-16,2,2); cx.fillRect(cx2+1,cy-16,2,2);
  // eye shine
  cx.fillStyle='rgba(255,255,255,0.9)'; cx.fillRect(cx2-3,cy-16,1,1); cx.fillRect(cx2+1,cy-16,1,1);
  // eyelid/lash
  cx.fillStyle='rgba(0,0,0,0.4)'; cx.fillRect(cx2-4,cy-17,4,1); cx.fillRect(cx2+0,cy-17,4,1);
  // blush (female)
  if(female){
    cx.fillStyle='rgba(255,140,140,0.45)';
    cx.fillRect(cx2-6,cy-14,3,2);
    cx.fillRect(cx2+3,cy-14,3,2);
  }
  // nose (tiny)
  cx.fillStyle='rgba(0,0,0,0.2)'; cx.fillRect(cx2-1,cy-12,1,1); cx.fillRect(cx2+1,cy-12,1,1);
  // mouth
  cx.fillStyle='#c84060'; cx.fillRect(cx2-2,cy-9,5,1);
  if(!female){ cx.fillStyle='rgba(0,0,0,0.15)'; cx.fillRect(cx2-1,cy-8,3,1); }

  cx.restore();

  // ── NAME TAG ──
  cx.font='bold 9px Nunito,sans-serif'; cx.textAlign='center';
  const nw=cx.measureText(name).width+10;
  cx.fillStyle='rgba(0,0,0,0.55)'; rr(cx2-nw/2+1,cy+13,nw,13,3,'rgba(0,0,0,0.5)');
  rr(cx2-nw/2,cy+12,nw,13,3,'rgba(20,15,35,0.85)');
  cx.fillStyle='#e8e8ff'; cx.fillText(name,cx2,cy+22);

  // ── SPEECH BUBBLE ──
  if(bubble){
    cx.font='bold 8px Nunito,sans-serif';
    const bw=cx.measureText(bubble).width+16;
    const bx2=cx2-bw/2, bby=cy-54;
    cx.fillStyle='rgba(0,0,0,0.2)'; rr(bx2+2,bby+2,bw,17,5,'rgba(0,0,0,0.15)');
    rr(bx2,bby,bw,17,5,'#fff9ee','#d4902a',1.5);
    cx.fillStyle='rgba(255,255,255,0.5)'; cx.fillRect(bx2+2,bby+1,bw-4,5);
    cx.fillStyle='#4a2a08'; cx.textAlign='center'; cx.fillText(bubble,cx2,bby+12);
    // tail
    cx.beginPath();cx.moveTo(cx2-4,bby+17);cx.lineTo(cx2,bby+24);cx.lineTo(cx2+4,bby+17);
    cx.fillStyle='#fff9ee';cx.fill();cx.strokeStyle='#d4902a';cx.lineWidth=1;cx.stroke();
  }
}

const BREAK_SPOTS=[
  {x:696,y:182},{x:728,y:392},{x:758,y:442},{x:708,y:142},
  {x:820,y:300},{x:868,y:192},{x:908,y:382},{x:858,y:458}
];

const agentSt=AGENTS.map((a,i)=>({
  ...a,
  deskX:DESK_POS[i].x+55,deskY:DESK_POS[i].y+72,
  x:DESK_POS[i].x+55,y:DESK_POS[i].y+72,
  tx:DESK_POS[i].x+55,ty:DESK_POS[i].y+72,
  wf:Math.floor(Math.random()*4),dir:'right',
  walkTimer:Math.floor(Math.random()*150),
  walkDelay:150+i*40,breakMode:false,breakTimer:0,ci:i,
}));

let tick=0;
function animate(){
  cx.clearRect(0,0,W,H);
  drawScene();
  DESK_POS.forEach((d,i)=>{drawRPGDesk(d.x,d.y,AGENTS[i].shirt);});
  tick++;
  agentSt.forEach((a,i)=>{
    a.walkTimer++;
    if(a.state==='idle'||a.breakMode){
      const dx2=a.tx-a.x,dy2=a.ty-a.y,dist=Math.sqrt(dx2*dx2+dy2*dy2);
      if(dist>2){a.x+=dx2/dist*1.5;a.y+=dy2/dist*1.5;a.dir=dx2>0?'right':'left';if(tick%5===0)a.wf++;}
      else{a.wf=0;if(a.breakMode){a.breakTimer++;if(a.breakTimer>160){a.breakMode=false;a.breakTimer=0;a.tx=a.deskX;a.ty=a.deskY;}}}
      if(a.walkTimer>a.walkDelay&&!a.breakMode){const s=BREAK_SPOTS[Math.floor(Math.random()*BREAK_SPOTS.length)];a.tx=s.x;a.ty=s.y;a.walkDelay=120+Math.random()*160;a.walkTimer=0;}
    }else{
      if(a.walkTimer>280+i*55&&!a.breakMode){a.breakMode=true;a.breakTimer=0;const s=BREAK_SPOTS[i%BREAK_SPOTS.length];a.tx=s.x;a.ty=s.y;a.walkTimer=0;}
      else if(!a.breakMode){a.x=a.deskX;a.y=a.deskY;a.wf=0;}
    }
  });
  [...agentSt].sort((a,b)=>a.y-b.y).forEach(a=>{
    const atDesk=!a.breakMode&&a.state!=='idle'&&Math.abs(a.x-a.deskX)<5;
    const bubble=atDesk&&a.state==='working'?a.task:a.breakMode?'☕':null;
    drawRPGChar(a.x,a.y,a.skin,a.shirt,a.hair,a.female,a.wf,a.dir,a.name,bubble,atDesk?a.ci:undefined);
  });
  requestAnimationFrame(animate);
}
animate();


async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  addMsg(msg,'user');
  addMsg('思考中...','sys');
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'You are LondonKelly AI assistant. Answer in Traditional Chinese. Be concise.',
        messages:[{role:'user',content:msg}]})
    });
    const data=await resp.json();
    const answer=data.content?.[0]?.text||'抱歉，無法回應。';
    const msgs=document.getElementById('chat-msgs');
    const last=msgs.lastChild;if(last&&last.textContent==='思考中...')msgs.removeChild(last);
    addMsg(answer,'bot');
  }catch(e){
    const msgs=document.getElementById('chat-msgs');
    const last=msgs.lastChild;if(last&&last.textContent==='思考中...')msgs.removeChild(last);
    addMsg('提示：Click 上面按鈕可手動觸發 agents！','bot');
  }
}
function addMsg(text,type){
  const msgs=document.getElementById('chat-msgs');
  const div=document.createElement('div');div.className='chat-msg-'+type;div.textContent=text;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
