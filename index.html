*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0820;margin:0;}
#wrap{font-family:'Nunito',sans-serif;max-width:960px;margin:0 auto;background:#0f0820;overflow:hidden;}
#topbar{background:linear-gradient(90deg,#1a0e35,#0d1a35);color:#f8e8c0;font-size:15px;font-weight:800;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2a1a50;}

canvas#oc{display:block;width:100%;image-rendering:pixelated;}
#bottom{background:#0a0518;padding:12px 16px;display:flex;gap:12px;border-top:2px solid #1a0e35;}
#logbox{flex:1;min-width:0;}
#logtitle{color:#ffd580;font-size:13px;font-weight:800;margin-bottom:6px;}
.logline{font-size:12px;line-height:2;font-family:'Nunito',sans-serif;}
.log-ok{color:#81c784;}.log-sys{color:#ffd580;}
#agentlist{min-width:175px;}
#alisttitle{color:#ffd580;font-size:13px;font-weight:800;margin-bottom:6px;}
.arow{display:flex;align-items:center;gap:6px;padding:2px 0;}
.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.adot.g{background:#4caf50;}.adot.o{background:#ff9800;animation:p 1.2s infinite;}.adot.gr{background:#666;}
@keyframes p{0%,100%{opacity:1;}50%{opacity:.3;}}
.aname{font-size:12px;font-weight:800;color:#f0e8c0;min-width:32px;}
.atask{font-size:11px;color:#b0a0d0;flex:1;}
.astatus{font-size:11px;color:#81c784;}.astatus.s{color:#ff9800;}
#btnrow{background:#07030f;padding:10px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
#btnrow2{background:#07030f;padding:0 16px 10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#f0e8c0;padding:10px 6px;border-radius:10px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s;text-align:center;}
.btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);}
.btn.hi{background:rgba(255,213,128,0.13);border-color:#ffd580;color:#ffd580;}
#notif{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif-toast{border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;animation:slideIn .4s ease,fadeOut .5s 3.5s forwards;min-width:200px;}
@keyframes slideIn{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-8px);}}

#chatbox{background:#07030f;border-top:2px solid #1a0e35;padding:12px 16px;}
#chat-title{color:#ffd580;font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
#chat-msgs{background:#0a0518;border-radius:10px;padding:10px;min-height:80px;max-height:200px;overflow-y:auto;margin-bottom:10px;font-size:13px;line-height:1.8;}
.chat-msg-user{color:#ffd580;margin:4px 0;}.chat-msg-user::before{content:'你：';}
.chat-msg-bot{color:#4dd0c4;margin:4px 0;}.chat-msg-bot::before{content:'🤖 ';}
.chat-msg-sys{color:#8070a0;font-size:11px;margin:4px 0;}
#chat-input-row{display:flex;gap:8px;}
#chat-input{flex:1;background:#1a1030;border:1.5px solid #2a1a50;color:#f0e8c0;padding:9px 14px;border-radius:10px;font-size:13px;font-family:'Nunito',sans-serif;outline:none;}
#chat-input:focus{border-color:#4dd0c4;}
#chat-send{background:#4dd0c4;color:#0f0820;border:none;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
#chat-send:hover{background:#6de0d4;}
#trigger-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.trigger-btn{background:#1a1030;border:1.5px solid #2a1a50;color:#b0a0d0;padding:8px 6px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;text-align:center;}
.trigger-btn:hover{background:#2a1a40;color:#ffd580;border-color:#ffd580;}
.trigger-btn.running{border-color:#ff9800;color:#ff9800;animation:p 1.2s infinite;}
.trigger-btn.done{border-color:#4caf50;color:#4caf50;}

const cv=document.getElementById('oc');

const AC=new (window.AudioContext||window.webkitAudioContext)();
function playDone(){
  const t=AC.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(0,t+i*0.12);
    g.gain.linearRampToValueAtTime(0.18,t+i*0.12+0.05);
    g.gain.linearRampToValueAtTime(0,t+i*0.12+0.22);
    o.start(t+i*0.12);o.stop(t+i*0.12+0.25);
  });
}
function playNotif(){
  const t=AC.currentTime;
  [880,1100].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=f;o.type='triangle';
    g.gain.setValueAtTime(0,t+i*0.1);
    g.gain.linearRampToValueAtTime(0.12,t+i*0.1+0.04);
    g.gain.linearRampToValueAtTime(0,t+i*0.1+0.18);
    o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
  });
}
document.addEventListener('click',()=>AC.resume(),{once:true});

function showToast(msg,type){
  const el=document.createElement('div');
  el.className='notif-toast';
  const isDone=type==='done';
  el.style.cssText='border:1.5px solid '+(isDone?'#4caf50':'#ff9800')+';background:'+(isDone?'#0f1f0f':'#1f140a')+';color:'+(isDone?'#c8ffc8':'#ffe0b0')+';';
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  if(isDone)playDone(); else playNotif();
  setTimeout(()=>el.remove(),4200);
}
