name: LondonKelly Collection Sorter

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  sort:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install requests google-analytics-data google-auth

    - name: Create GA4 key file
      run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json

    - name: Run sort collections
      env:
        SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        GA4_KEY_FILE: ga4_key.json
      run: |
        python sort_collections.py 2>&1 | tee sort_output.txt

    - name: Run update hot items
      env:
        SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        GA4_KEY_FILE: ga4_key.json
      run: |
        python update_hot_items.py 2>&1 | tee hot_output.txt

    - name: Write status.json
      run: |
        SORT_OUT=$(cat sort_output.txt | tail -5 | tr '\n' '|' | sed 's/"/\\"/g')
        HOT_OUT=$(cat hot_output.txt | tail -3 | tr '\n' '|' | sed 's/"/\\"/g')
        NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        SKIPPED=$(grep -c "未夠3日" sort_output.txt || true)
        if [ "$SKIPPED" -gt "0" ]; then
          SORT_STATUS="skipped"
        else
          SORT_STATUS="done"
        fi
        cat > status.json << JSONEOF
        {
          "last_run": "$NOW",
          "sort_status": "$SORT_STATUS",
          "agents": {
            "sort_collections": {"status": "$SORT_STATUS", "log": "$SORT_OUT"},
            "update_hot_items": {"status": "done", "log": "$HOT_OUT"}
          }
        }
        JSONEOF

    - name: Commit status.json
      run: |
        git config user.name "LondonKelly Bot"
        git config user.email "bot@londonkelly.com"
        git add status.json last_run.txt || true
        git stash
        git pull --rebase origin main
        git stash pop
        git add status.json last_run.txt || true
        git diff --staged --quiet || git commit -m "Update status [skip ci]"
        git push
