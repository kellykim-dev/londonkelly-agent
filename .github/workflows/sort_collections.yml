name: LondonKelly Collection Sorter
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  sort:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install requests google-analytics-data google-auth
      - name: Write GA4 key
        run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json
      - name: Run Collection Sorter
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: python sort_collections.py
      - name: Commit files
        run: |
          git config user.name "LondonKelly Bot"
          git config user.email "bot@londonkelly.com"
          git add status.json last_run.txt || true
          git stash
          git pull --rebase origin main
          git stash pop
          git add status.json last_run.txt || true
          git diff --staged --quiet || git commit -m "Update status [skip ci]"
          git push
      - name: Send WhatsApp notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="%F0%9F%A4%96+花花%3A+排序完成"
          else
            MSG="%F0%9F%86%98+花花%3A+排序失敗"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=$PHONE&text=$MSG&apikey=$APIKEY" || true
