name: LondonKelly Content Agent
on:
  workflow_dispatch:
jobs:
  content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install requests anthropic
      - name: Run Content Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python content_agent.py
      - name: Commit files
        run: |
          git config user.name "LondonKelly Bot"
          git config user.email "bot@londonkelly.com"
          git add content.html status.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add content.html status.json
          git diff --staged --quiet || git commit -m "Update content [skip ci]"
          git push

      - name: Send WhatsApp notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="%F0%9F%A4%96+啾皮%3A+社群內容已生成"
          else
            MSG="%F0%9F%86%98+啾皮%3A+社群內容失敗"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=$PHONE&text=$MSG&apikey=$APIKEY" || true
