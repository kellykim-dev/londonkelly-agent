name: LondonKelly Indexing API

on:
  schedule:
    - cron: '0 1 * * *'  # 每日凌晨1am UTC = 香港時間早上9am
  workflow_dispatch:      # 可以手動跑

jobs:
  indexing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install requests google-auth google-api-python-client

    - name: Write GA4 key file
      run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json

    - name: Run Indexing API
      env:
        SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      run: python indexing_api.py

    - name: Update status.json
      run: python update_status.py indexing

    - name: Commit status
      run: |
        git config user.name "LondonKelly Bot"
        git config user.email "bot@londonkelly.com"
        git add status.json
        git stash
        git pull --rebase origin main
        git stash pop
        git add status.json
        git diff --staged --quiet || git commit -m "Update indexing status [skip ci]"
        git push

      - name: Send WhatsApp notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          WF="${{ github.workflow }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅+${WF}+完成！"
        else
            MSG="❌+${WF}+失敗！請檢查+Actions"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.CALLMEBOT_PHONE }}&text=${MSG}&apikey=${{ secrets.CALLMEBOT_APIKEY }}" || true
