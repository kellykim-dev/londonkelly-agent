name: LondonKelly Indexing API
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  indexing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install requests google-auth google-api-python-client
      - name: Write GA4 key file
        run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json
      - name: Run Indexing API
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python indexing_api.py
      - name: Update status.json
        run: python update_status.py indexing
      - name: Commit status
        run: |
          git config user.name "LondonKelly Bot"
          git config user.email "bot@londonkelly.com"
          git add status.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add status.json
          git diff --staged --quiet || git commit -m "Update indexing status [skip ci]"
          git push

      - name: Send WhatsApp notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="%F0%9F%A4%96+得됀뚯%3A+Indexing+200URL丹껁갫"
          else
            MSG="%F0%9F%86%98+得됀뚯%3A+Indexing邏쐕뎽"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=$PHONE&text=$MSG&apikey=$APIKEY" || true
