name: LondonKelly Hot Items Updater
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  update-hot-items:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests google-analytics-data google-auth
      - name: Write GA4 key
        run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json
      - name: Run hot items updater
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python update_hot_items.py

      - name: Send WhatsApp notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="%F0%9F%A4%96+йҳҝйј»%3A+Hot+Items+жӣҙж–°е®ҢжҲҗ"
          else
            MSG="%F0%9F%86%98+йҳҝйј»%3A+Hot+ItemsеӨұж•—"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=$PHONE&text=$MSG&apikey=$APIKEY" || true
