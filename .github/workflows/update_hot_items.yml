name: LondonKelly Hot Items Updater

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-hot-items:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-analytics-data google-auth

      - name: Write GA4 key
        run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json

      - name: Run hot items updater
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python update_hot_items.py

      - name: Send WhatsApp notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          WF="${{ github.workflow }}"
          if [ "$STATUS" = "success" ]; then
            MSG="${WF}+%E2%9C%85+%E5%AE%8C%E6%88%90"
          else
            MSG="${WF}+%E2%9D%8C+%E5%A4%B1%E6%95%97%EF%BC%81%E8%AB%8B%E6%AA%A2%E6%9F%A5+Actions"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.CALLMEBOT_PHONE }}&text=${MSG}&apikey=${{ secrets.CALLMEBOT_APIKEY }}" || true
