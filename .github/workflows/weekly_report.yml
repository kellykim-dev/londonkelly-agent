name: LondonKelly Weekly Report
on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install requests anthropic google-analytics-data google-auth gspread
      - name: Write GA4 key
        run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json
      - name: Run Weekly Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: python weekly_report.py
      - name: Commit files
        run: |
          git config user.name "LondonKelly Bot"
          git config user.email "bot@londonkelly.com"
          git add report.html report_kr.html status.json || true
          git stash
          git pull --rebase origin main
          git stash pop
          git add report.html report_kr.html status.json || true
          git diff --staged --quiet || git commit -m "Update weekly report [skip ci]"
          git push

      - name: Send WhatsApp notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="%F0%9F%A4%96+иұҶиҠҪ%3A+йҖұе ұе·Із”ҹжҲҗ"
          else
            MSG="%F0%9F%86%98+иұҶиҠҪ%3A+йҖұе ұеӨұж•—"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=$PHONE&text=$MSG&apikey=$APIKEY" || true
