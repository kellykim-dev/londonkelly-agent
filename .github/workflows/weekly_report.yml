name: LondonKelly Weekly Report

on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install anthropic google-analytics-data google-auth

    - name: Create GA4 key file
      run: echo '${{ secrets.GA4_KEY_FILE }}' > ga4_key.json

    - name: Run weekly report
      env:
        GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        GA4_KEY_FILE: ga4_key.json
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python weekly_report.py 2>&1 | tee report_output.txt

    - name: Update status.json
      run: |
        NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        python3 -c "
import json
with open('status.json', 'r') as f:
    data = json.load(f)
data['weekly_report'] = {'status': 'done', 'last_run': '$NOW'}
with open('status.json', 'w') as f:
    json.dump(data, f, indent=2)
"

    - name: Commit files
      run: |
        git config user.name "LondonKelly Bot"
        git config user.email "bot@londonkelly.com"
        git add report.html status.json
        git diff --staged --quiet || git commit -m "Update weekly report [skip ci]"
        git push
