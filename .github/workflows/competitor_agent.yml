name: LondonKelly Competitor Monitor
on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:
jobs:
  competitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install requests anthropic
      - name: Run Competitor Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python competitor_agent.py
      - name: Commit files
        run: |
          git config user.name "LondonKelly Bot"
          git config user.email "bot@londonkelly.com"
          git add competitor.html competitor_kr.html status.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add competitor.html competitor_kr.html status.json
          git diff --staged --quiet || git commit -m "Update competitor report [skip ci]"
          git push

      - name: Send WhatsApp notification
        if: always()
        run: |
          if [ "${ job.status }" = "success" ]; then
            MSG="%F0%9F%A4%96+彩彩%3A+競爭對手報告已更新"
          else
            MSG="%F0%9F%86%98+彩彩+失敗%EF%BC%81請檢查+Actions"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=${ secrets.CALLMEBOT_PHONE }&text=${MSG}&apikey=${ secrets.CALLMEBOT_APIKEY }" || true
