name: LondonKelly Competitor Monitor

on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  competitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install anthropic requests beautifulsoup4

    - name: Run competitor monitor
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python competitor_agent.py

    - name: Update status.json
      run: python update_status.py competitor

    - name: Commit files
      run: |
        git config user.name "LondonKelly Bot"
        git config user.email "bot@londonkelly.com"
        git add competitor.html competitor_kr.html status.json
        git stash
        git pull --rebase origin main
        git stash pop
        git add competitor.html competitor_kr.html status.json
        git diff --staged --quiet || git commit -m "Update competitor report [skip ci]"
        git push
      - name: Send WhatsApp notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MSG="%F0%9F%A4%96+彩彩%3A+競爭對手報告已更新"
          else
            MSG="%F0%9F%86%98+彩彩+%E5%A4%B1%E6%95%97%EF%BC%81%E8%AB%8B%E6%AA%A2%E6%9F%A5+Actions"
          fi
          curl -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.CALLMEBOT_PHONE }}&text=${MSG}&apikey=${{ secrets.CALLMEBOT_APIKEY }}" || true
